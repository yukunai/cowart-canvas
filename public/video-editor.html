<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cowart AI 剪辑</title>
    <link rel="icon" href="/favicon.svg" />
    <style>
      * { box-sizing: border-box; }
      [hidden] { display: none !important; }
      :root { color: #24313f; background: #f3f6f8; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; min-width: 980px; overflow: hidden; }
      button, input, select, textarea { font: inherit; }
      button { cursor: pointer; }
      .app { display: grid; grid-template-columns: 348px minmax(520px, 1fr) 292px; width: 100vw; height: 100vh; background: #eef2f5; }
      .sidebar, .inspector { min-height: 0; overflow: auto; background: #fff; }
      .sidebar { border-right: 1px solid #dce3ea; }
      .inspector { border-left: 1px solid #dce3ea; }
      .panel { border-bottom: 1px solid #e8edf2; padding: 14px 16px; }
      .mode-nav { display: flex; gap: 7px; }
      .mode-nav button { flex: 1 1 0; min-width: 0; height: 34px; border: 1px solid #ced8e3; border-radius: 7px; background: #fff; color: #263442; font-size: 12px; font-weight: 750; white-space: nowrap; }
      .mode-nav button.active { border-color: #2474ed; background: #eaf2ff; color: #1457b5; }
      h2, h3, p { margin: 0; }
      h2 { font-size: 14px; }
      h3 { color: #344353; font-size: 12px; }
      .muted { color: #6c7b8b; font-size: 12px; line-height: 1.5; }
      .section-title { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
      .mode-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .mode-tabs button { min-height: 38px; border: 1px solid #d2dbe5; border-radius: 7px; background: #f8fafc; color: #354454; font-size: 12px; font-weight: 750; }
      .mode-tabs button.active { border-color: #2474ed; background: #edf4ff; color: #1559b6; }
      .dropzone { display: grid; min-height: 104px; place-items: center; border: 1px dashed #aebdcd; border-radius: 8px; background: #f8fafc; color: #607285; text-align: center; }
      .dropzone.dragging { border-color: #2474ed; background: #edf4ff; }
      .dropzone strong { display: block; color: #314153; font-size: 13px; margin-bottom: 5px; }
      .file-summary { display: none; grid-template-columns: 58px 1fr; gap: 10px; align-items: center; }
      .file-summary.visible { display: grid; }
      .file-poster { display: grid; width: 58px; height: 42px; place-items: center; border-radius: 6px; background: #121923; color: #fff; font-size: 10px; }
      .file-summary strong { display: block; overflow: hidden; font-size: 12px; text-overflow: ellipsis; white-space: nowrap; }
      .file-summary small { color: #6a7988; font-size: 11px; }
      label { display: grid; gap: 6px; color: #334252; font-size: 12px; font-weight: 700; }
      textarea, input, select { width: 100%; border: 1px solid #d2dbe5; border-radius: 7px; background: #f8fafc; color: #24313f; outline: none; }
      textarea:focus, input:focus, select:focus { border-color: #6fa5ef; box-shadow: 0 0 0 2px rgba(36, 116, 237, .1); }
      textarea { min-height: 74px; resize: vertical; line-height: 1.5; padding: 9px 10px; }
      input, select { min-height: 36px; padding: 0 9px; }
      .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
      .stack { display: grid; gap: 10px; }
      .check-row { display: flex; align-items: center; gap: 8px; color: #4c5c6d; font-size: 12px; }
      .check-row input { width: 15px; min-height: 15px; margin: 0; }
      .primary, .secondary, .icon-button { display: inline-flex; align-items: center; justify-content: center; gap: 7px; border-radius: 7px; font-weight: 750; }
      .primary { width: 100%; min-height: 40px; border: 1px solid #2474ed; background: #2474ed; color: #fff; }
      .primary:disabled { cursor: not-allowed; opacity: .55; }
      .secondary { min-height: 34px; border: 1px solid #ccd6e1; background: #fff; color: #334252; padding: 0 11px; font-size: 12px; }
      .secondary.danger { color: #c0342b; }
      .workspace { display: grid; grid-template-rows: 50px minmax(300px, 1fr) 244px; min-width: 0; min-height: 0; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid #dce3ea; background: #fff; padding: 0 14px; }
      .topbar-left, .topbar-actions { display: flex; align-items: center; gap: 8px; min-width: 0; }
      .status { overflow: hidden; color: #687889; font-size: 12px; text-overflow: ellipsis; white-space: nowrap; }
      .canvas { display: grid; min-height: 0; place-items: center; overflow: hidden; background: #e9eef3; padding: 18px; }
      .preview-shell { position: relative; display: grid; max-width: 100%; max-height: 100%; place-items: center; border-radius: 6px; background: #111923; box-shadow: 0 16px 38px rgba(37, 51, 66, .14); overflow: hidden; }
      .preview-shell.landscape { width: min(82%, 960px); aspect-ratio: 16/9; }
      .preview-shell.portrait { height: 94%; aspect-ratio: 9/16; }
      .preview-shell.square { height: 86%; aspect-ratio: 1; }
      .preview-shell video { width: 100%; height: 100%; background: #111923; object-fit: cover; }
      .preview-empty { color: #afbcc9; text-align: center; }
      .preview-empty strong { display: block; color: #e6ebf0; font-size: 14px; margin-bottom: 6px; }
      .safe-zone { position: absolute; inset: 7%; border: 1px dashed rgba(255,255,255,.35); pointer-events: none; }
      .timeline { min-width: 0; overflow: auto; border-top: 1px solid #d6dee7; background: #fff; padding: 12px 14px; }
      .timeline-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
      .timeline-tools { display: flex; gap: 6px; }
      .ruler { position: relative; height: 23px; border-bottom: 1px solid #cfd8e3; color: #758495; font-size: 10px; }
      .ruler span { position: absolute; transform: translateX(-50%); }
      .track { position: relative; display: flex; gap: 4px; height: 72px; margin-top: 8px; padding: 7px; border-radius: 7px; background: #edf1f5; overflow-x: auto; }
      .clip { position: relative; flex: 0 0 auto; min-width: 72px; height: 58px; overflow: hidden; border: 1px solid #7ba8e8; border-radius: 6px; background: linear-gradient(135deg, #d8e8ff, #edf4ff); color: #174f9b; cursor: grab; padding: 7px 8px; }
      .clip.dragging { opacity: .45; }
      .clip.active { border-color: #1468de; box-shadow: 0 0 0 2px rgba(36,116,237,.18); }
      .clip strong { display: block; overflow: hidden; font-size: 11px; text-overflow: ellipsis; white-space: nowrap; }
      .clip small { font-size: 10px; }
      .playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #e13c32; pointer-events: none; z-index: 4; }
      .playhead::before { content: ""; position: absolute; top: 0; left: -4px; width: 10px; height: 8px; background: #e13c32; clip-path: polygon(0 0,100% 0,50% 100%); }
      .analysis-card { display: grid; gap: 8px; border: 1px solid #dbe3eb; border-radius: 8px; background: #f8fafc; padding: 10px; }
      .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
      .metric { border-radius: 6px; background: #fff; padding: 8px; }
      .metric strong { display: block; font-size: 15px; }
      .metric span { color: #738292; font-size: 10px; }
      .segment-list { display: grid; gap: 6px; max-height: 280px; overflow: auto; }
      .segment-row { display: grid; grid-template-columns: 1fr 30px; gap: 6px; align-items: center; border-radius: 7px; background: #f5f7fa; padding: 7px; }
      .segment-row.active { background: #eaf2ff; }
      .segment-row button { border: 0; background: transparent; color: #2c3b4b; text-align: left; }
      .segment-row small { display: block; color: #748393; margin-top: 2px; }
      .delete { width: 28px; height: 28px; border: 0; border-radius: 6px; background: transparent; color: #a93c35; }
      .delete:hover { background: #ffebe9; }
      .result { display: none; gap: 9px; }
      .result.visible { display: grid; }
      .result video { width: 100%; border-radius: 7px; background: #111923; }
      .progress { display: none; height: 3px; overflow: hidden; border-radius: 999px; background: #dbe5f0; }
      .progress.visible { display: block; }
      .progress::after { content: ""; display: block; width: 38%; height: 100%; background: #2474ed; animation: loading 1.1s infinite ease-in-out; }
      @keyframes loading { from { transform: translateX(-110%); } to { transform: translateX(300%); } }
      @media (max-width: 1220px) { .app { grid-template-columns: 310px minmax(480px, 1fr) 250px; } }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="sidebar">
        <section class="panel">
          <nav class="mode-nav">
            <button data-page="/image-generator.html">图片</button><button data-page="/product-detail-generator.html">设计</button><button data-page="/?installed=1&video=1">视频</button><button class="active">剪辑</button><button data-page="/?installed=1">画布</button><button data-page="/notebook.html">文本</button>
          </nav>
        </section>
        <section class="panel">
          <div class="mode-tabs" id="modeTabs">
            <button class="active" data-mode="highlights">AI 精剪</button><button data-mode="commentary">影视解说</button><button data-mode="manual">手动剪辑</button>
          </div>
        </section>
        <section class="panel stack">
          <div class="section-title"><h2>源视频</h2><button class="secondary" id="replaceButton">重新选择</button></div>
          <div class="dropzone" id="dropzone"><div><strong>拖入视频开始剪辑</strong><span class="muted">MP4、MOV、M4V、WebM，最大 1 GB</span></div></div>
          <div class="file-summary" id="fileSummary"><div class="file-poster">VIDEO</div><div><strong id="fileName"></strong><small id="fileMeta"></small></div></div>
          <input id="fileInput" type="file" accept="video/mp4,video/quicktime,video/webm,.m4v" hidden />
          <div class="progress" id="uploadProgress"></div>
        </section>
        <section class="panel stack" id="aiPanel">
          <div class="section-title"><h2 id="workflowTitle">AI 精剪设置</h2><span class="muted" id="workflowHint">自动保留主要精华</span></div>
          <label>希望保留的内容<textarea id="editGoal" placeholder="例如：保留核心观点、产品演示和结论，删除重复表达"></textarea></label>
          <div class="form-grid"><label>目标时长<select id="targetDuration"><option value="30">30 秒</option><option value="60" selected>1 分钟</option><option value="180">3 分钟</option><option value="300">5 分钟</option></select></label><label>节奏<select id="pace"><option>紧凑</option><option>自然</option><option>舒缓</option></select></label></div>
          <label class="check-row"><input id="removeSilence" type="checkbox" checked /> 删除明显静音和空白</label>
          <label class="check-row"><input id="keepOpening" type="checkbox" checked /> 保留开场与结尾信息</label>
          <button class="primary" id="analyzeButton">分析并生成精华时间线</button>
          <div class="progress" id="analyzeProgress"></div>
        </section>
        <section class="panel stack" id="commentaryPanel" hidden>
          <div class="section-title"><h2>解说文案</h2><button class="secondary" id="draftScriptButton">生成草稿</button></div>
          <label>解说角度<select id="commentaryStyle"><option>剧情快速复盘</option><option>人物分析</option><option>悬疑梳理</option><option>知识点评</option></select></label>
          <textarea id="commentaryScript" placeholder="AI 分析后会在这里生成可编辑的解说草稿，也可以直接粘贴自己的文案。"></textarea>
          <label class="check-row"><input id="narrationEnabled" type="checkbox" /> 导出时使用本机中文配音</label>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div class="topbar-left"><strong>AI 视频剪辑</strong><span class="status" id="status">导入视频后开始分析</span></div>
          <div class="topbar-actions"><select id="aspectRatio"><option value="16:9">16:9 横屏</option><option value="9:16">9:16 竖屏</option><option value="1:1">1:1 方形</option></select><button class="secondary" id="exportButton">导出 MP4</button></div>
        </header>
        <div class="canvas">
          <div class="preview-shell landscape" id="previewShell"><div class="preview-empty" id="previewEmpty"><strong>还没有导入视频</strong><span>AI 分析和手动剪辑都在这个独立页面完成</span></div><video id="preview" controls hidden></video><div class="safe-zone" id="safeZone" hidden></div></div>
        </div>
        <section class="timeline">
          <div class="timeline-head"><div><h2>可编辑时间线</h2><p class="muted" id="timelineSummary">AI 选择的片段会出现在这里，可以拖动排序、分割或删除。</p></div><div class="timeline-tools"><button class="secondary" id="addButton">加入当前位置</button><button class="secondary" id="splitButton">分割</button><button class="secondary" id="restoreButton">恢复整段</button></div></div>
          <div class="ruler" id="ruler"></div><div class="track" id="track"><div class="playhead" id="playhead" hidden></div></div>
        </section>
      </section>

      <aside class="inspector">
        <section class="panel stack">
          <div class="section-title"><h2>工程概览</h2><span class="muted" id="saveState">本地保存</span></div>
          <div class="analysis-card"><div class="metric-grid"><div class="metric"><strong id="sourceDuration">0:00</strong><span>原片时长</span></div><div class="metric"><strong id="editDuration">0:00</strong><span>成片时长</span></div><div class="metric"><strong id="clipCount">0</strong><span>保留片段</span></div><div class="metric"><strong id="savedDuration">0:00</strong><span>节省时长</span></div></div><p class="muted" id="analysisSummary">等待分析。</p></div>
        </section>
        <section class="panel stack" id="framingPanel">
          <div class="section-title"><h2>智能取景</h2><span class="muted">横屏转竖屏</span></div>
          <label>主体水平位置<input id="focusX" type="range" min="0" max="100" value="50" /></label>
          <p class="muted">转换为 9:16 时可调整人物或主体位于左侧、中间或右侧。</p>
        </section>
        <section class="panel stack" id="clipEditor" hidden>
          <div class="section-title"><h2>当前片段</h2><span class="muted">精确修剪</span></div>
          <label>片段名称<input id="clipLabel" type="text" /></label>
          <div class="form-grid"><label>开始（秒）<input id="clipStart" type="number" min="0" step="0.05" /></label><label>结束（秒）<input id="clipEnd" type="number" min="0" step="0.05" /></label></div>
          <button class="secondary" id="applyClipButton">应用片段调整</button>
        </section>
        <section class="panel stack"><div class="section-title"><h2>片段</h2><span class="muted" id="segmentCount">0 条</span></div><div class="segment-list" id="segmentList"></div></section>
        <section class="panel stack result" id="resultPanel"><div class="section-title"><h2>导出结果</h2><a class="secondary" id="downloadLink" download>下载</a></div><video id="resultVideo" controls></video><p class="muted" id="resultPath"></p></section>
      </aside>
    </main>
    <script>
      const state = { mode: 'highlights', source: null, segments: [], activeId: null, draggedId: null, aspectRatio: '16:9', analysis: null };
      const $ = (selector) => document.querySelector(selector);
      const apiBase = location.protocol === 'file:' ? 'http://127.0.0.1:43219' : '';
      const esc = (value) => String(value ?? '').replace(/[&<>"']/g, (character) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[character]));
      const fmt = (seconds) => { const value = Math.max(0, Number(seconds) || 0); const mins = Math.floor(value / 60); return `${mins}:${String(Math.floor(value % 60)).padStart(2, '0')}`; };
      const uid = () => `clip-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      const setStatus = (text) => { $('#status').textContent = text; };
      const selectedDuration = () => state.segments.reduce((sum, segment) => sum + Math.max(0, segment.end - segment.start), 0);
      const saveProject = () => { localStorage.setItem('cowart-video-editor-project', JSON.stringify({ mode: state.mode, source: state.source, segments: state.segments, aspectRatio: state.aspectRatio, activeId: state.activeId, commentaryScript: $('#commentaryScript').value, editGoal: $('#editGoal').value })); $('#saveState').textContent = '已自动保存'; };
      const updateMetrics = () => { const source = state.source?.meta?.duration || 0; const edit = selectedDuration(); $('#sourceDuration').textContent = fmt(source); $('#editDuration').textContent = fmt(edit); $('#clipCount').textContent = state.segments.length; $('#savedDuration').textContent = fmt(Math.max(0, source - edit)); $('#segmentCount').textContent = `${state.segments.length} 条`; $('#timelineSummary').textContent = state.segments.length ? `当前保留 ${state.segments.length} 个片段，共 ${fmt(edit)}。拖动卡片可调整叙事顺序。` : 'AI 选择的片段会出现在这里，可以拖动排序、分割或删除。'; };
      const renderRuler = () => { const ruler = $('#ruler'); ruler.innerHTML = ''; const duration = state.source?.meta?.duration || 0; if (!duration) return; const marks = 6; for (let index = 0; index <= marks; index += 1) { const span = document.createElement('span'); span.style.left = `${index / marks * 100}%`; span.textContent = fmt(duration * index / marks); ruler.append(span); } };
      const syncClipEditor = () => { const segment = state.segments.find((item) => item.id === state.activeId); $('#clipEditor').hidden = !segment; if (!segment) return; $('#clipLabel').value = segment.label || ''; $('#clipStart').value = segment.start.toFixed(2); $('#clipEnd').value = segment.end.toFixed(2); };
      const seekToSegment = (segment) => { state.activeId = segment.id; $('#preview').currentTime = segment.start; renderSegments(); };
      const renderSegments = () => { const track = $('#track'); track.querySelectorAll('.clip').forEach((node) => node.remove()); const list = $('#segmentList'); list.innerHTML = ''; const duration = state.source?.meta?.duration || 1; state.segments.forEach((segment, index) => { const clip = document.createElement('button'); clip.type = 'button'; clip.className = `clip${segment.id === state.activeId ? ' active' : ''}`; clip.draggable = true; clip.dataset.id = segment.id; clip.style.width = `${Math.max(72, (segment.end - segment.start) / duration * 760)}px`; clip.innerHTML = `<strong>${esc(segment.label || `片段 ${index + 1}`)}</strong><small>${fmt(segment.start)} - ${fmt(segment.end)}</small>`; clip.onclick = () => seekToSegment(segment); clip.ondragstart = () => { state.draggedId = segment.id; clip.classList.add('dragging'); }; clip.ondragend = () => { state.draggedId = null; clip.classList.remove('dragging'); }; clip.ondragover = (event) => event.preventDefault(); clip.ondrop = (event) => { event.preventDefault(); if (!state.draggedId || state.draggedId === segment.id) return; const from = state.segments.findIndex((item) => item.id === state.draggedId); const to = state.segments.findIndex((item) => item.id === segment.id); const [moved] = state.segments.splice(from, 1); state.segments.splice(to, 0, moved); renderSegments(); saveProject(); }; track.append(clip);
        const row = document.createElement('div'); row.className = `segment-row${segment.id === state.activeId ? ' active' : ''}`; row.innerHTML = `<button type="button"><strong>${esc(segment.label || `片段 ${index + 1}`)}</strong><small>${fmt(segment.start)} - ${fmt(segment.end)} · ${fmt(segment.end - segment.start)}</small></button><button type="button" class="delete" title="删除片段">×</button>`; row.querySelector('button').onclick = () => seekToSegment(segment); row.querySelector('.delete').onclick = () => { state.segments = state.segments.filter((item) => item.id !== segment.id); if (state.activeId === segment.id) state.activeId = state.segments[0]?.id || null; renderSegments(); saveProject(); }; list.append(row); }); syncClipEditor(); updateMetrics(); };
      const loadSource = (source) => { state.source = source; $('#fileName').textContent = source.name; $('#fileMeta').textContent = `${source.meta.width} × ${source.meta.height} · ${fmt(source.meta.duration)} · ${(source.meta.size / 1024 / 1024).toFixed(1)} MB`; $('#fileSummary').classList.add('visible'); $('#dropzone').hidden = true; const video = $('#preview'); video.src = `${apiBase}${source.url}`; video.hidden = false; $('#previewEmpty').hidden = true; $('#safeZone').hidden = false; renderRuler(); updateMetrics(); setStatus('视频已导入，可以 AI 分析或直接手动剪辑'); saveProject(); };
      const uploadFile = async (file) => { if (!file) return; $('#uploadProgress').classList.add('visible'); setStatus('正在导入视频...'); try { const response = await fetch(`${apiBase}/api/video-editor-upload`, { method: 'POST', headers: { 'Content-Type': 'application/octet-stream', 'X-File-Name': encodeURIComponent(file.name) }, body: file }); const data = await response.json(); if (!response.ok || data.error) throw new Error(data.error || '导入失败'); state.segments = [{ id: uid(), start: 0, end: data.meta.duration, label: '完整原片' }]; state.activeId = state.segments[0].id; loadSource(data); renderSegments(); } catch (error) { setStatus(error.message || '导入视频失败'); alert(error.message || '导入视频失败'); } finally { $('#uploadProgress').classList.remove('visible'); } };
      const analyze = async () => { if (!state.source) return alert('请先导入视频'); if (state.mode === 'manual') { state.segments = [{ id: uid(), start: 0, end: state.source.meta.duration, label: '完整原片' }]; renderSegments(); return; } $('#analyzeProgress').classList.add('visible'); $('#analyzeButton').disabled = true; setStatus(state.mode === 'commentary' ? '正在提取解说画面和叙事节奏...' : '正在识别静音、节奏和高价值片段...'); try { const response = await fetch(`${apiBase}/api/video-editor-analyze`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path: state.source.path, targetDuration: Number($('#targetDuration').value), mode: state.mode, goal: $('#editGoal').value.trim(), pace: $('#pace').value, removeSilence: $('#removeSilence').checked, keepOpening: $('#keepOpening').checked }) }); const data = await response.json(); if (!response.ok || data.error) throw new Error(data.error || '分析失败'); state.analysis = data; state.segments = data.segments.map((segment) => ({ ...segment, id: uid() })); state.activeId = state.segments[0]?.id || null; $('#analysisSummary').textContent = data.summary; if (state.mode === 'commentary' && !$('#commentaryScript').value.trim()) draftCommentary(); renderSegments(); setStatus(`分析完成，已保留 ${state.segments.length} 个精华片段`); saveProject(); } catch (error) { setStatus(error.message || '分析失败'); alert(error.message || '分析失败'); } finally { $('#analyzeProgress').classList.remove('visible'); $('#analyzeButton').disabled = false; } };
      const draftCommentary = () => { const style = $('#commentaryStyle').value; const goal = $('#editGoal').value.trim(); const lines = state.segments.map((segment, index) => `第 ${index + 1} 段（${fmt(segment.start)}）：这里呈现关键情节，说明人物行动、变化和它对后续发展的影响。`); $('#commentaryScript').value = `${style}解说稿\n\n开场：用一句明确的问题带观众进入内容。${goal ? `\n重点：${goal}` : ''}\n\n${lines.join('\n\n')}\n\n结尾：回到核心观点，补充自己的判断，而不是简单复述原片。`; saveProject(); };
      const setMode = (mode) => { state.mode = mode; document.querySelectorAll('#modeTabs button').forEach((button) => button.classList.toggle('active', button.dataset.mode === mode)); const manual = mode === 'manual'; $('#aiPanel').hidden = manual; $('#commentaryPanel').hidden = mode !== 'commentary'; $('#workflowTitle').textContent = mode === 'commentary' ? '影视解说设置' : 'AI 精剪设置'; $('#workflowHint').textContent = mode === 'commentary' ? '提取关键情节并重组' : '自动保留主要精华'; setStatus(manual ? '手动模式：使用时间线上的分割、删除和排序工具' : mode === 'commentary' ? '影视解说模式：先分析关键画面，再编辑解说文案' : 'AI 精剪模式：自动提取主要精华'); saveProject(); };
      const setAspect = (aspect) => { state.aspectRatio = aspect; const shell = $('#previewShell'); shell.className = `preview-shell ${aspect === '9:16' ? 'portrait' : aspect === '1:1' ? 'square' : 'landscape'}`; $('#framingPanel').style.opacity = aspect === '9:16' ? '1' : '.55'; $('#preview').style.objectPosition = `${$('#focusX').value}% center`; saveProject(); };
      const splitAtPlayhead = () => { if (!state.source) return; const time = $('#preview').currentTime; const index = state.segments.findIndex((segment) => time > segment.start + .12 && time < segment.end - .12); if (index < 0) return alert('播放头需要位于一个保留片段内部'); const original = state.segments[index]; state.segments.splice(index, 1, { ...original, id: uid(), end: time, label: `${original.label} A` }, { ...original, id: uid(), start: time, label: `${original.label} B` }); renderSegments(); saveProject(); };
      const exportVideo = async () => { if (!state.source || !state.segments.length) return alert('请先导入视频并保留至少一个片段'); $('#exportButton').disabled = true; setStatus('正在本机合成 MP4，请保持页面打开...'); try { const response = await fetch(`${apiBase}/api/video-editor-export`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path: state.source.path, segments: state.segments, aspectRatio: state.aspectRatio, focusX: Number($('#focusX').value) / 100, title: state.source.name, quality: 'standard', commentaryScript: $('#commentaryScript').value, narrationEnabled: $('#narrationEnabled').checked && state.mode === 'commentary' }) }); const data = await response.json(); if (!response.ok || data.error) throw new Error(data.error || '导出失败'); $('#resultPanel').classList.add('visible'); $('#resultVideo').src = `${apiBase}${data.url}`; $('#downloadLink').href = `${apiBase}${data.url}`; $('#downloadLink').download = data.outputPath.split('/').pop(); $('#resultPath').textContent = `已保存：${data.outputPath}`; setStatus('导出完成，视频已保存到 Downloads/Cowart Edits'); } catch (error) { setStatus(error.message || '导出失败'); alert(error.message || '导出失败'); } finally { $('#exportButton').disabled = false; } };
      document.querySelectorAll('[data-page]').forEach((button) => button.onclick = () => location.href = button.dataset.page);
      document.querySelectorAll('#modeTabs button').forEach((button) => button.onclick = () => setMode(button.dataset.mode));
      $('#dropzone').onclick = () => $('#fileInput').click(); $('#replaceButton').onclick = () => $('#fileInput').click(); $('#fileInput').onchange = (event) => uploadFile(event.target.files[0]);
      $('#dropzone').ondragover = (event) => { event.preventDefault(); $('#dropzone').classList.add('dragging'); }; $('#dropzone').ondragleave = () => $('#dropzone').classList.remove('dragging'); $('#dropzone').ondrop = (event) => { event.preventDefault(); $('#dropzone').classList.remove('dragging'); uploadFile(event.dataTransfer.files[0]); };
      $('#analyzeButton').onclick = analyze; $('#draftScriptButton').onclick = draftCommentary; $('#splitButton').onclick = splitAtPlayhead; $('#restoreButton').onclick = () => { if (!state.source) return; state.segments = [{ id: uid(), start: 0, end: state.source.meta.duration, label: '完整原片' }]; state.activeId = state.segments[0].id; renderSegments(); saveProject(); }; $('#addButton').onclick = () => { if (!state.source) return; const start = $('#preview').currentTime; state.segments.push({ id: uid(), start, end: Math.min(start + 5, state.source.meta.duration), label: `新增片段 ${state.segments.length + 1}` }); renderSegments(); saveProject(); }; $('#exportButton').onclick = exportVideo;
      $('#applyClipButton').onclick = () => { const segment = state.segments.find((item) => item.id === state.activeId); if (!segment || !state.source) return; const start = Math.max(0, Number($('#clipStart').value)); const end = Math.min(state.source.meta.duration, Number($('#clipEnd').value)); if (!(end > start + .1)) return alert('结束时间必须晚于开始时间'); segment.start = start; segment.end = end; segment.label = $('#clipLabel').value.trim() || segment.label; renderSegments(); saveProject(); setStatus('片段范围已更新'); };
      $('#aspectRatio').onchange = (event) => setAspect(event.target.value); $('#focusX').oninput = () => { $('#preview').style.objectPosition = `${$('#focusX').value}% center`; };
      $('#preview').ontimeupdate = () => { if (!state.source) return; const video = $('#preview'); const left = Math.min(100, video.currentTime / state.source.meta.duration * 100); $('#playhead').hidden = false; $('#playhead').style.left = `${left}%`; if (!video.paused) { const activeIndex = state.segments.findIndex((segment) => video.currentTime >= segment.start && video.currentTime <= segment.end + .08); if (activeIndex >= 0 && video.currentTime >= state.segments[activeIndex].end - .06) { const next = state.segments[activeIndex + 1]; if (next) { video.currentTime = next.start; state.activeId = next.id; renderSegments(); } else video.pause(); } } };
      $('#commentaryScript').oninput = saveProject; $('#editGoal').oninput = saveProject;
      (() => { try { const saved = JSON.parse(localStorage.getItem('cowart-video-editor-project') || 'null'); if (!saved) return; if (saved.source?.path) { state.segments = saved.segments || []; state.activeId = saved.activeId || state.segments[0]?.id; loadSource(saved.source); renderSegments(); } if (saved.editGoal) $('#editGoal').value = saved.editGoal; if (saved.commentaryScript) $('#commentaryScript').value = saved.commentaryScript; setMode(saved.mode || 'highlights'); $('#aspectRatio').value = saved.aspectRatio || '16:9'; setAspect($('#aspectRatio').value); } catch {} })();
    </script>
  </body>
</html>
