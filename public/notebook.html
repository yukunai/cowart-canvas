<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cowart 文本</title>
    <style>
      :root {
        color: #1f2937;
        background: #f4f7fb;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button,
      input,
      textarea {
        border: 1px solid #cfd9e6;
        border-radius: 8px;
        background: #ffffff;
        color: #253244;
      }

      button {
        min-height: 34px;
        padding: 0 12px;
        font-weight: 760;
        cursor: pointer;
      }

      button:hover {
        border-color: #8fb3f5;
        color: #185abc;
      }

      .primary {
        border-color: #1f6feb;
        background: #2672ea;
        color: #ffffff;
      }

      .primary:hover {
        border-color: #1d5fd3;
        background: #1f64d6;
        color: #ffffff;
      }

      .danger {
        border-color: #fecaca;
        color: #b42318;
      }

      .app {
        display: grid;
        grid-template-columns: var(--category-width, 320px) 12px minmax(0, 1fr);
        height: 100vh;
        min-height: 720px;
      }

      .categories {
        overflow: auto;
        border-right: 1px solid #dce3eb;
        background: #ffffff;
      }

      .pane-resizer {
        width: 12px;
        min-width: 12px;
        border: 0;
        border-left: 1px solid #dce3eb;
        border-right: 1px solid #e8eef5;
        border-radius: 0;
        background: #f2f5f8;
        cursor: col-resize;
        padding: 0;
        touch-action: none;
        user-select: none;
      }

      .pane-resizer::before {
        display: block;
        width: 2px;
        height: 34px;
        margin: calc(50vh - 17px) auto 0;
        border-radius: 999px;
        background: #aab6c4;
        content: "";
      }

      .panel {
        display: grid;
        gap: 12px;
        border-bottom: 1px solid #edf1f6;
        padding: 16px 20px;
      }

      .mode-nav {
        display: flex;
        gap: 8px;
      }

      .mode-nav button {
        flex: 0 0 60px;
        width: 60px;
        min-height: 34px;
        color: #24313f;
        font-size: 13px;
        font-weight: 780;
        padding: 0 10px;
      }

      .mode-nav button.active {
        border-color: #1f6feb;
        background: #eaf2ff;
        color: #164ea6;
      }

      .utility-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .category-actions {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      .category-actions button {
        min-height: 26px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 650;
        padding: 0 8px;
      }

      .list {
        display: grid;
        gap: 2px;
        padding: 8px 10px 12px;
      }

      .item {
        display: grid;
        gap: 2px;
        width: 100%;
        min-height: 32px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: #24313f;
        font-size: 13px;
        line-height: 1.25;
        text-align: left;
        padding: 6px 9px;
      }

      .category-item {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        min-height: 32px;
        position: relative;
      }

      .category-group {
        display: grid;
        gap: 2px;
      }

      .category-note-list {
        display: grid;
        gap: 1px;
        padding-left: 12px;
      }

      .note-tree-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        width: 100%;
        min-height: 28px;
        border: 0;
        border-radius: 5px;
        background: transparent;
        color: #344054;
        font-size: 13px;
        line-height: 1.25;
        text-align: left;
        padding: 5px 9px;
      }

      .item:hover,
      .note-tree-item:hover {
        background: #f5f7fa;
        color: #185abc;
      }

      .note-tree-item.active {
        background: #eef5ff;
        color: #164ea6;
      }

      .note-tree-item span {
        color: #8090a3;
        font-size: 10px;
      }

      .inline-rename {
        width: 100%;
        min-height: 34px;
        padding: 0 10px;
      }

      .note-create-card {
        display: none;
        gap: 8px;
        border-bottom: 1px solid #edf1f6;
        padding: 0 20px 16px;
      }

      .note-create-card.open {
        display: grid;
      }

      .note-create-card select,
      .note-create-card input {
        min-height: 36px;
        padding: 0 10px;
      }

      .note-create-actions {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 8px;
      }

      .item.active {
        background: #eef5ff;
        color: #164ea6;
        box-shadow: none;
      }

      .category-item.active::before {
        position: absolute;
        left: 0;
        top: 7px;
        width: 3px;
        height: calc(100% - 14px);
        border-radius: 999px;
        background: #1f6feb;
        content: "";
      }

      .item strong {
        overflow: hidden;
        font-weight: 680;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .item span {
        overflow: hidden;
        color: #607083;
        font-size: 10px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .context-menu {
        position: fixed;
        z-index: 20;
        display: none;
        min-width: 132px;
        overflow: hidden;
        border: 1px solid #d8e0e8;
        border-radius: 10px;
        background: #ffffff;
        box-shadow: 0 14px 36px rgba(20, 36, 56, 0.16);
        padding: 6px;
      }

      .context-menu.open {
        display: grid;
        gap: 4px;
      }

      .context-menu button {
        min-height: 34px;
        justify-content: flex-start;
        border: 0;
        background: transparent;
        padding: 0 10px;
      }

      .context-menu button:hover {
        background: #f2f6fb;
      }

      .context-menu button.danger {
        color: #d92d20;
      }

      .editor {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-width: 0;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        border-bottom: 1px solid #dce3eb;
        background: #ffffff;
        padding: 14px 18px;
      }

      .title-input {
        min-height: 38px;
        font-size: 18px;
        font-weight: 780;
        padding: 0 12px;
      }

      .editor-body {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        min-height: 0;
      }

      .markdown-editor,
      .preview {
        min-width: 0;
        min-height: 0;
      }

      .markdown-editor {
        width: 100%;
        height: 100%;
        border: 0;
        border-right: 1px solid #dce3eb;
        border-radius: 0;
        background: #ffffff;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 14px;
        line-height: 1.65;
        outline: none;
        padding: 18px;
        resize: none;
      }

      .preview {
        overflow: auto;
        background: #fbfdff;
        color: #1f2937;
        line-height: 1.7;
        padding: 20px 24px;
      }

      .preview h1,
      .preview h2,
      .preview h3 {
        margin: 18px 0 8px;
        line-height: 1.25;
      }

      .preview h1 {
        font-size: 26px;
      }

      .preview h2 {
        font-size: 21px;
      }

      .preview h3 {
        font-size: 17px;
      }

      .preview p,
      .preview ul,
      .preview ol,
      .preview pre,
      .preview blockquote {
        margin: 0 0 12px;
      }

      .preview code {
        border-radius: 5px;
        background: #eef2f7;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        padding: 2px 5px;
      }

      .preview pre {
        overflow: auto;
        border-radius: 8px;
        background: #111827;
        color: #f8fafc;
        padding: 12px;
      }

      .preview pre code {
        background: transparent;
        color: inherit;
        padding: 0;
      }

      .preview blockquote {
        border-left: 3px solid #9db4d0;
        color: #526170;
        padding-left: 12px;
      }

      .empty {
        display: grid;
        place-items: center;
        color: #607083;
        padding: 24px;
        text-align: center;
      }

      .storage-path {
        overflow-wrap: anywhere;
        color: #607083;
        font-size: 12px;
        line-height: 1.45;
      }

      @media (max-width: 640px) {
        .editor-body {
          grid-template-columns: 1fr;
        }

        .markdown-editor {
          min-height: 320px;
          border-right: 0;
          border-bottom: 1px solid #dce3eb;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="categories">
        <section class="panel">
          <div class="mode-nav">
            <button type="button" id="imageButton">图片</button>
            <button type="button" id="designButton">设计</button>
            <button type="button" id="videoButton">视频</button>
            <button type="button" id="canvasButton">画布</button>
            <button type="button" class="active" id="textButton">文本</button>
          </div>
          <p class="storage-path" id="storagePathText">正在读取保存位置...</p>
        </section>
        <section class="panel">
          <div class="utility-row category-actions">
            <button type="button" class="primary" id="addCategoryButton">分类</button>
            <button type="button" id="showAddNoteButton">新笔记</button>
          </div>
        </section>
        <section class="note-create-card" id="noteCreateCard">
          <select id="noteCategorySelect" aria-label="选择分类"></select>
          <input id="newNoteTitleInput" placeholder="笔记标题" />
          <div class="note-create-actions">
            <button type="button" class="primary" id="confirmAddNoteButton">创建</button>
            <button type="button" id="cancelAddNoteButton">取消</button>
          </div>
        </section>
        <div class="list" id="categoryList"></div>
      </aside>

      <button type="button" class="pane-resizer" id="categoryResizer" aria-label="调整分类宽度"></button>

      <section class="editor">
        <header class="topbar">
          <input class="title-input" id="noteTitleInput" placeholder="笔记标题" />
          <button type="button" id="exportButton">导出 Markdown</button>
        </header>
        <div class="editor-body">
          <textarea class="markdown-editor" id="noteContentInput" placeholder="在这里写 Markdown..."></textarea>
          <article class="preview" id="preview"></article>
        </div>
      </section>
    </main>

    <div class="context-menu" id="categoryMenu" role="menu">
      <button type="button" id="renameCategoryMenuItem">改名</button>
      <button type="button" class="danger" id="deleteCategoryMenuItem">删除</button>
    </div>
    <div class="context-menu" id="noteMenu" role="menu">
      <button type="button" class="danger" id="deleteNoteMenuItem">删除笔记</button>
    </div>

    <script>
      const storageKey = "cowart-markdown-notebook";
      const apiBase = location.protocol === "file:" ? "http://127.0.0.1:43219" : "";
      let data = loadNotebook();
      let activeCategoryId = data.activeCategoryId || data.categories[0]?.id;
      let activeNoteId = data.activeNoteId || data.categories[0]?.notes[0]?.id;
      let storagePath = data.storagePath || "";
      let saveTimer = null;
      let menuCategoryId = "";
      let menuNoteId = "";
      let editingCategoryId = "";
      let hasLocalChanges = false;

      const categoryList = document.querySelector("#categoryList");
      const noteTitleInput = document.querySelector("#noteTitleInput");
      const noteContentInput = document.querySelector("#noteContentInput");
      const preview = document.querySelector("#preview");
      const exportButton = document.querySelector("#exportButton");
      const storagePathText = document.querySelector("#storagePathText");
      const categoryMenu = document.querySelector("#categoryMenu");
      const noteMenu = document.querySelector("#noteMenu");
      const noteCreateCard = document.querySelector("#noteCreateCard");
      const noteCategorySelect = document.querySelector("#noteCategorySelect");
      const newNoteTitleInput = document.querySelector("#newNoteTitleInput");

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function startPaneResize(event, cssVar, min, max) {
        event.preventDefault();
        event.currentTarget.setPointerCapture?.(event.pointerId);
        const startX = event.clientX;
        const measuredWidth = cssVar.includes("category") ? document.querySelector(".categories").getBoundingClientRect().width : 320;
        const startValue = parseInt(getComputedStyle(document.documentElement).getPropertyValue(cssVar), 10) || measuredWidth;
        const onMove = (moveEvent) => {
          const next = clamp(startValue + moveEvent.clientX - startX, min, max);
          document.documentElement.style.setProperty(cssVar, `${Math.round(next)}px`);
          localStorage.setItem(`cowart-text-${cssVar}`, `${Math.round(next)}px`);
        };
        const onUp = () => {
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
        };
        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp, { once: true });
      }

      function restorePaneWidths() {
        for (const cssVar of ["--category-width", "--note-width"]) {
          const value = localStorage.getItem(`cowart-text-${cssVar}`);
          if (value) document.documentElement.style.setProperty(cssVar, value);
        }
      }

      function createId(prefix) {
        return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
      }

      function createDefaultNotebook() {
        const categoryId = createId("category");
        const noteId = createId("note");
        return {
          activeCategoryId: categoryId,
          activeNoteId: noteId,
          categories: [
            {
              id: categoryId,
              name: "默认分类",
              notes: [
                {
                  id: noteId,
                  title: "第一篇 Markdown",
                  content: "# 第一篇 Markdown\n\n- 可以建分类\n- 可以写多篇内容\n- 右侧会实时预览\n\n> 数据会保存到本机文件夹。",
                  updatedAt: new Date().toISOString(),
                },
              ],
            },
          ],
        };
      }

      function loadNotebook() {
        try {
          const parsed = JSON.parse(localStorage.getItem(storageKey) || "null");
          if (parsed?.categories?.length) return parsed;
        } catch {}
        return createDefaultNotebook();
      }

      function persistLocalBackup() {
        data.activeCategoryId = activeCategoryId;
        data.activeNoteId = activeNoteId;
        localStorage.setItem(storageKey, JSON.stringify(data, null, 2));
      }

      async function loadNotebookFromDisk() {
        try {
          const response = await fetch(`${apiBase}/api/notebook`, { cache: "no-store" });
          const next = await response.json();
          if (!response.ok || next.error) throw new Error(next.error || "读取文本失败");
          if (hasLocalChanges) return;
          data = normalizeNotebook(next);
          storagePath = next.storagePath || "";
          activeCategoryId = data.activeCategoryId || data.categories[0]?.id;
          activeNoteId = data.activeNoteId || data.categories[0]?.notes[0]?.id;
          persistLocalBackup();
          renderAll();
        } catch (error) {
          storagePath = "";
          renderAll();
        }
      }

      function normalizeNotebook(value) {
        if (!value || !Array.isArray(value.categories) || value.categories.length === 0) return createDefaultNotebook();
        return {
          activeCategoryId: value.activeCategoryId,
          activeNoteId: value.activeNoteId,
          categories: value.categories.map((category) => ({
            id: String(category.id || createId("category")),
            name: String(category.name || "未命名分类"),
            notes: Array.isArray(category.notes)
              ? category.notes.map((note) => ({
                  id: String(note.id || createId("note")),
                  title: String(note.title || "未命名笔记"),
                  content: String(note.content || ""),
                  updatedAt: String(note.updatedAt || new Date().toISOString()),
                  filePath: note.filePath || "",
                }))
              : [],
          })),
        };
      }

      function saveNotebook() {
        hasLocalChanges = true;
        persistLocalBackup();
        scheduleDiskSave();
      }

      function scheduleDiskSave() {
        window.clearTimeout(saveTimer);
        saveTimer = window.setTimeout(() => {
          saveNotebookToDisk().catch(() => {});
        }, 250);
      }

      async function saveNotebookToDisk() {
        const response = await fetch(`${apiBase}/api/notebook`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const next = await response.json();
        if (!response.ok || next.error) throw new Error(next.error || "保存文本失败");
        storagePath = next.storagePath || storagePath;
        return next;
      }

      function activeCategory() {
        return data.categories.find((category) => category.id === activeCategoryId) || data.categories[0];
      }

      function categoryById(id) {
        return data.categories.find((category) => category.id === id);
      }

      function categoryForNote(noteId) {
        return data.categories.find((category) => category.notes.some((note) => note.id === noteId));
      }

      function noteById(noteId) {
        return categoryForNote(noteId)?.notes.find((note) => note.id === noteId);
      }

      function activeNote() {
        const category = activeCategory();
        return category?.notes.find((note) => note.id === activeNoteId) || category?.notes[0];
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderMarkdown(markdown) {
        const lines = String(markdown || "").split(/\r?\n/);
        const html = [];
        let inCode = false;
        let listOpen = false;
        for (const rawLine of lines) {
          const line = rawLine;
          if (line.trim().startsWith("```")) {
            if (listOpen) {
              html.push("</ul>");
              listOpen = false;
            }
            html.push(inCode ? "</code></pre>" : "<pre><code>");
            inCode = !inCode;
            continue;
          }
          if (inCode) {
            html.push(`${escapeHtml(line)}\n`);
            continue;
          }
          if (/^\s*[-*]\s+/.test(line)) {
            if (!listOpen) {
              html.push("<ul>");
              listOpen = true;
            }
            html.push(`<li>${inlineMarkdown(line.replace(/^\s*[-*]\s+/, ""))}</li>`);
            continue;
          }
          if (listOpen) {
            html.push("</ul>");
            listOpen = false;
          }
          if (line.startsWith("### ")) html.push(`<h3>${inlineMarkdown(line.slice(4))}</h3>`);
          else if (line.startsWith("## ")) html.push(`<h2>${inlineMarkdown(line.slice(3))}</h2>`);
          else if (line.startsWith("# ")) html.push(`<h1>${inlineMarkdown(line.slice(2))}</h1>`);
          else if (line.startsWith("> ")) html.push(`<blockquote>${inlineMarkdown(line.slice(2))}</blockquote>`);
          else if (line.trim() === "") html.push("");
          else html.push(`<p>${inlineMarkdown(line)}</p>`);
        }
        if (listOpen) html.push("</ul>");
        if (inCode) html.push("</code></pre>");
        return html.join("\n");
      }

      function inlineMarkdown(value) {
        return escapeHtml(value)
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
          .replace(/\*([^*]+)\*/g, "<em>$1</em>");
      }

      function renderCategories() {
        categoryList.innerHTML = "";
        for (const category of data.categories) {
          const group = document.createElement("div");
          group.className = "category-group";

          if (editingCategoryId === category.id) {
            const input = document.createElement("input");
            input.className = "inline-rename";
            input.value = category.name;
            input.addEventListener("keydown", (event) => {
              if (event.key === "Enter") input.blur();
              if (event.key === "Escape") {
                editingCategoryId = "";
                renderCategories();
              }
            });
            input.addEventListener("blur", () => finishRenameCategory(category, input.value));
            group.appendChild(input);
            setTimeout(() => {
              input.focus();
              input.select();
            }, 0);
          } else {
            const button = document.createElement("button");
            button.type = "button";
            button.className = `item category-item ${category.id === activeCategoryId ? "active" : ""}`;
            button.innerHTML = `<strong>${escapeHtml(category.name)}</strong><span>${category.notes.length} 篇</span>`;
            button.addEventListener("click", () => {
              activeCategoryId = category.id;
              activeNoteId = category.notes[0]?.id;
              saveNotebook();
              renderAll();
            });
            button.addEventListener("contextmenu", (event) => {
              event.preventDefault();
              activeCategoryId = category.id;
              activeNoteId = category.notes[0]?.id;
              menuCategoryId = category.id;
              saveNotebook();
              renderAll();
              showContextMenu(categoryMenu, event.clientX, event.clientY);
            });
            group.appendChild(button);
          }

          if (category.id === activeCategoryId) {
            const noteListElement = document.createElement("div");
            noteListElement.className = "category-note-list";
            if (category.notes.length === 0) {
              noteListElement.innerHTML = "<div class='empty'>这个分类里还没有笔记。</div>";
            }
            for (const note of category.notes) {
              const noteButton = document.createElement("button");
              noteButton.type = "button";
              noteButton.className = `note-tree-item ${note.id === activeNoteId ? "active" : ""}`;
              noteButton.innerHTML = `<strong>${escapeHtml(note.title || "未命名笔记")}</strong><span>${new Date(note.updatedAt).toLocaleDateString()}</span>`;
              noteButton.addEventListener("click", () => {
                activeCategoryId = category.id;
                activeNoteId = note.id;
                saveNotebook();
                renderAll();
              });
              noteButton.addEventListener("contextmenu", (event) => {
                event.preventDefault();
                activeCategoryId = category.id;
                activeNoteId = note.id;
                menuNoteId = note.id;
                saveNotebook();
                renderAll();
                showContextMenu(noteMenu, event.clientX, event.clientY);
              });
              noteListElement.appendChild(noteButton);
            }
            group.appendChild(noteListElement);
          }

          categoryList.appendChild(group);
        }
      }

      function renderEditor() {
        const note = activeNote();
        const disabled = !note;
        noteTitleInput.disabled = disabled;
        noteContentInput.disabled = disabled;
        exportButton.disabled = disabled;
        if (!note) {
          noteTitleInput.value = "";
          noteContentInput.value = "";
          preview.innerHTML = "<div class='empty'>选择或新建一篇笔记。</div>";
          return;
        }
        noteTitleInput.value = note.title;
        noteContentInput.value = note.content;
        preview.innerHTML = renderMarkdown(note.content);
      }

      function renderAll() {
        renderCategoryOptions();
        renderCategories();
        renderEditor();
        storagePathText.textContent = storagePath ? `保存位置：${storagePath}` : "本地文件服务未连接，暂存在浏览器。";
        exportButton.textContent = storagePath ? "导出 Markdown" : "导出 Markdown";
      }

      function addCategory() {
        const name = nextCategoryName();
        const category = { id: createId("category"), name, notes: [] };
        data.categories.unshift(category);
        activeCategoryId = category.id;
        activeNoteId = undefined;
        editingCategoryId = category.id;
        saveNotebook();
        renderAll();
      }

      function renderCategoryOptions() {
        noteCategorySelect.innerHTML = "";
        for (const category of data.categories) {
          const option = document.createElement("option");
          option.value = category.id;
          option.textContent = category.name;
          option.selected = category.id === activeCategoryId;
          noteCategorySelect.appendChild(option);
        }
      }

      function nextCategoryName() {
        const base = "分类";
        if (!data.categories.some((category) => category.name === base)) return base;
        let index = data.categories.length + 1;
        while (data.categories.some((category) => category.name === `${base} ${index}`)) index += 1;
        return `${base} ${index}`;
      }

      function renameCategory(category = activeCategory()) {
        if (!category) return;
        hideCategoryMenu();
        editingCategoryId = category.id;
        renderCategories();
      }

      function finishRenameCategory(category, value) {
        const name = value.trim();
        editingCategoryId = "";
        if (!name) return;
        category.name = name;
        saveNotebook();
        renderAll();
      }

      function deleteCategory(category = activeCategory()) {
        if (!category) return;
        hideCategoryMenu();
        if (!window.confirm(`确定删除分类“${category.name}”以及其中 ${category.notes.length} 篇笔记吗？`)) return;
        data.categories = data.categories.filter((item) => item.id !== category.id);
        if (data.categories.length === 0) data = createDefaultNotebook();
        activeCategoryId = data.categories[0]?.id;
        activeNoteId = data.categories[0]?.notes[0]?.id;
        saveNotebook();
        renderAll();
      }

      function showContextMenu(menu, x, y) {
        const padding = 8;
        hideMenus();
        menu.classList.add("open");
        const rect = menu.getBoundingClientRect();
        menu.style.left = `${Math.min(x, window.innerWidth - rect.width - padding)}px`;
        menu.style.top = `${Math.min(y, window.innerHeight - rect.height - padding)}px`;
      }

      function hideCategoryMenu() {
        hideMenus();
      }

      function hideMenus() {
        categoryMenu.classList.remove("open");
        noteMenu.classList.remove("open");
      }

      function menuCategory() {
        return categoryById(menuCategoryId) || activeCategory();
      }

      function menuNote() {
        return noteById(menuNoteId) || activeNote();
      }

      function showAddNoteForm() {
        renderCategoryOptions();
        noteCreateCard.classList.add("open");
        noteCategorySelect.value = activeCategoryId || data.categories[0]?.id || "";
        newNoteTitleInput.value = "新笔记";
        newNoteTitleInput.focus();
        newNoteTitleInput.select();
      }

      function hideAddNoteForm() {
        noteCreateCard.classList.remove("open");
      }

      function addNote(categoryId = activeCategoryId, title = "新笔记") {
        const category = categoryById(categoryId) || activeCategory();
        if (!category) return;
        const note = {
          id: createId("note"),
          title: title.trim() || "新笔记",
          content: "# 新笔记\n\n",
          updatedAt: new Date().toISOString(),
        };
        category.notes.unshift(note);
        activeCategoryId = category.id;
        activeNoteId = note.id;
        saveNotebook();
        renderAll();
      }

      function confirmAddNote() {
        addNote(noteCategorySelect.value, newNoteTitleInput.value || "新笔记");
        hideAddNoteForm();
      }

      function deleteNote(note = activeNote()) {
        const category = note ? categoryForNote(note.id) : activeCategory();
        if (!category || !note) return;
        hideMenus();
        if (!window.confirm(`确定删除笔记“${note.title || "未命名笔记"}”吗？`)) return;
        category.notes = category.notes.filter((item) => item.id !== note.id);
        activeCategoryId = category.id;
        activeNoteId = category.notes[0]?.id;
        saveNotebook();
        renderAll();
      }

      function updateActiveNote() {
        const note = activeNote();
        if (!note) return;
        note.title = noteTitleInput.value;
        note.content = noteContentInput.value;
        note.updatedAt = new Date().toISOString();
        preview.innerHTML = renderMarkdown(note.content);
        saveNotebook();
        renderCategories();
      }

      function exportMarkdown() {
        const note = activeNote();
        if (!note) return;
        const blob = new Blob([note.content], { type: "text/markdown" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `${(note.title || "note").replace(/[\\/:*?"<>|]+/g, "-")}.md`;
        link.click();
        URL.revokeObjectURL(url);
      }

      document.querySelector("#imageButton").addEventListener("click", () => {
        window.location.href = location.protocol === "file:" ? `${apiBase}/image-generator.html` : "/image-generator.html";
      });
      document.querySelector("#designButton").addEventListener("click", () => {
        window.location.href = location.protocol === "file:" ? `${apiBase}/product-detail-generator.html` : "/product-detail-generator.html";
      });
      document.querySelector("#videoButton").addEventListener("click", () => {
        window.location.href = location.protocol === "file:" ? `${apiBase}/?installed=1&video=1` : "/?installed=1&video=1";
      });
      document.querySelector("#canvasButton").addEventListener("click", () => {
        window.location.href = location.protocol === "file:" ? `${apiBase}/?installed=1` : "/?installed=1";
      });
      document.querySelector("#addCategoryButton").addEventListener("click", addCategory);
      document.querySelector("#renameCategoryMenuItem").addEventListener("click", () => renameCategory(menuCategory()));
      document.querySelector("#deleteCategoryMenuItem").addEventListener("click", () => deleteCategory(menuCategory()));
      document.querySelector("#showAddNoteButton").addEventListener("click", showAddNoteForm);
      document.querySelector("#confirmAddNoteButton").addEventListener("click", confirmAddNote);
      document.querySelector("#cancelAddNoteButton").addEventListener("click", hideAddNoteForm);
      document.querySelector("#deleteNoteMenuItem").addEventListener("click", () => deleteNote(menuNote()));
      document.querySelector("#exportButton").addEventListener("click", exportMarkdown);
      noteTitleInput.addEventListener("input", updateActiveNote);
      noteContentInput.addEventListener("input", updateActiveNote);
      newNoteTitleInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") confirmAddNote();
        if (event.key === "Escape") hideAddNoteForm();
      });
      document.querySelector("#categoryResizer").addEventListener("pointerdown", (event) => startPaneResize(event, "--category-width", 220, 620));
      window.addEventListener("click", (event) => {
        if (!categoryMenu.contains(event.target) && !noteMenu.contains(event.target)) hideMenus();
      });
      window.addEventListener("scroll", hideMenus, true);
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          hideMenus();
          hideAddNoteForm();
        }
      });

      restorePaneWidths();
      renderAll();
      loadNotebookFromDisk();
    </script>
  </body>
</html>
