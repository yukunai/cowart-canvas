<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cowart 文本</title>
    <style>
      :root {
        color: #1f2937;
        background: #f4f7fb;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button,
      input,
      select,
      textarea {
        border: 1px solid #cfd9e6;
        border-radius: 8px;
        background: #ffffff;
        color: #253244;
      }

      button {
        min-height: 34px;
        padding: 0 12px;
        font-weight: 760;
        cursor: pointer;
      }

      button:hover {
        border-color: #8fb3f5;
        color: #185abc;
      }

      .primary {
        border-color: #1f6feb;
        background: #2672ea;
        color: #ffffff;
      }

      .primary:hover {
        border-color: #1d5fd3;
        background: #1f64d6;
        color: #ffffff;
      }

      .danger {
        border-color: #fecaca;
        color: #b42318;
      }

      .app {
        display: grid;
        grid-template-columns: var(--category-width, 320px) 12px minmax(0, 1fr);
        height: 100vh;
        min-height: 720px;
      }

      .categories {
        overflow: auto;
        border-right: 1px solid #dce3eb;
        background: #ffffff;
      }

      .pane-resizer {
        width: 12px;
        min-width: 12px;
        border: 0;
        border-left: 1px solid #dce3eb;
        border-right: 1px solid #e8eef5;
        border-radius: 0;
        background: #f2f5f8;
        cursor: col-resize;
        padding: 0;
        touch-action: none;
        user-select: none;
      }

      .pane-resizer::before {
        display: block;
        width: 2px;
        height: 34px;
        margin: calc(50vh - 17px) auto 0;
        border-radius: 999px;
        background: #aab6c4;
        content: "";
      }

      .panel {
        display: grid;
        gap: 12px;
        border-bottom: 1px solid #edf1f6;
        padding: 16px 20px;
      }

      .mode-nav {
        display: flex;
        gap: 8px;
      }

      .mode-nav button {
        flex: 0 0 60px;
        width: 60px;
        min-height: 34px;
        color: #24313f;
        font-size: 13px;
        font-weight: 780;
        padding: 0 10px;
      }

      .mode-nav button.active {
        border-color: #1f6feb;
        background: #eaf2ff;
        color: #164ea6;
      }

      .utility-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .category-actions {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      .search-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
      }

      .search-row input {
        min-height: 32px;
        font-size: 12px;
        padding: 0 10px;
      }

      .subtle-action {
        min-height: 32px;
        border-radius: 7px;
        color: #45566a;
        font-size: 12px;
        font-weight: 650;
        padding: 0 10px;
      }

      .category-actions button {
        min-height: 26px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 650;
        padding: 0 8px;
      }

      .list {
        display: grid;
        gap: 2px;
        padding: 8px 10px 12px;
      }

      .item {
        display: grid;
        gap: 2px;
        width: 100%;
        min-height: 32px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: #24313f;
        font-size: 13px;
        line-height: 1.25;
        text-align: left;
        padding: 6px 9px;
      }

      .category-item {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        min-height: 32px;
        position: relative;
      }

      .category-group {
        display: grid;
        gap: 2px;
      }

      .category-note-list {
        display: grid;
        gap: 1px;
        padding-left: 12px;
      }

      .note-tree-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        width: 100%;
        min-height: 28px;
        border: 0;
        border-radius: 5px;
        background: transparent;
        color: #344054;
        font-size: 13px;
        line-height: 1.25;
        text-align: left;
        padding: 5px 9px;
      }

      .item:hover,
      .note-tree-item:hover {
        background: #f5f7fa;
        color: #185abc;
      }

      .note-tree-item.active {
        background: #eef5ff;
        color: #164ea6;
      }

      .note-tree-item span {
        color: #8090a3;
        font-size: 10px;
      }

      .note-meta-line {
        grid-column: 1 / -1;
        overflow: hidden;
        color: #748398;
        font-size: 10px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .note-badge {
        display: inline-flex;
        align-items: center;
        height: 16px;
        border-radius: 999px;
        background: #edf4ff;
        color: #185abc;
        font-size: 10px;
        font-weight: 700;
        padding: 0 6px;
      }

      .inline-rename {
        width: 100%;
        min-height: 34px;
        padding: 0 10px;
      }

      .note-create-card {
        display: none;
        gap: 8px;
        border-bottom: 1px solid #edf1f6;
        padding: 0 20px 16px;
      }

      .note-create-card.open {
        display: grid;
      }

      .note-create-card select,
      .note-create-card input {
        min-height: 36px;
        padding: 0 10px;
      }

      .note-create-actions {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 8px;
      }

      .item.active {
        background: #eef5ff;
        color: #164ea6;
        box-shadow: none;
      }

      .category-item.active::before {
        position: absolute;
        left: 0;
        top: 7px;
        width: 3px;
        height: calc(100% - 14px);
        border-radius: 999px;
        background: #1f6feb;
        content: "";
      }

      .item strong {
        overflow: hidden;
        font-weight: 680;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .item span {
        overflow: hidden;
        color: #607083;
        font-size: 10px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .context-menu {
        position: fixed;
        z-index: 20;
        display: none;
        min-width: 132px;
        overflow: hidden;
        border: 1px solid #d8e0e8;
        border-radius: 10px;
        background: #ffffff;
        box-shadow: 0 14px 36px rgba(20, 36, 56, 0.16);
        padding: 6px;
      }

      .context-menu.open {
        display: grid;
        gap: 4px;
      }

      .context-menu button {
        min-height: 34px;
        justify-content: flex-start;
        border: 0;
        background: transparent;
        padding: 0 10px;
      }

      .context-menu button:hover {
        background: #f2f6fb;
      }

      .context-menu button.danger {
        color: #d92d20;
      }

      .editor {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-width: 0;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 150px 116px repeat(10, auto);
        gap: 10px;
        border-bottom: 1px solid #dce3eb;
        background: #ffffff;
        padding: 14px 18px;
      }

      .editor-action {
        min-height: 34px;
        font-size: 12px;
        font-weight: 680;
        padding: 0 10px;
      }

      .code-language-select,
      .tag-input,
      .color-input {
        min-height: 34px;
        font-size: 12px;
        padding: 0 10px;
      }

      .color-input {
        width: 42px;
        min-width: 42px;
        padding: 4px;
      }

      .tag-input {
        min-width: 0;
      }

      .title-input {
        min-height: 38px;
        font-size: 18px;
        font-weight: 780;
        padding: 0 12px;
      }

      .editor-body {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        min-height: 0;
      }

      .markdown-editor,
      .preview {
        min-width: 0;
        min-height: 0;
      }

      .markdown-editor {
        width: 100%;
        height: 100%;
        border: 0;
        border-right: 1px solid #dce3eb;
        border-radius: 0;
        background: #ffffff;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 14px;
        line-height: 1.65;
        outline: none;
        padding: 18px;
        resize: none;
      }

      .preview {
        overflow: auto;
        background: #fbfdff;
        color: #1f2937;
        line-height: 1.7;
        padding: 20px 24px;
      }

      .preview h1,
      .preview h2,
      .preview h3 {
        margin: 18px 0 8px;
        line-height: 1.25;
      }

      .preview h1 {
        font-size: 26px;
      }

      .preview h2 {
        font-size: 21px;
      }

      .preview h3 {
        font-size: 17px;
      }

      .preview p,
      .preview ul,
      .preview ol,
      .toc,
      .code-block,
      .preview blockquote {
        margin: 0 0 12px;
      }

      .toc {
        border: 1px solid #dce7f3;
        border-radius: 8px;
        background: #ffffff;
        padding: 10px 12px;
      }

      .toc strong {
        display: block;
        margin-bottom: 6px;
        color: #344054;
        font-size: 12px;
      }

      .toc a {
        display: block;
        overflow: hidden;
        color: #52677e;
        font-size: 12px;
        line-height: 1.6;
        text-decoration: none;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .toc a.level-2 {
        padding-left: 12px;
      }

      .toc a:hover {
        color: #185abc;
      }

      .code-block {
        position: relative;
      }

      .copy-code-button {
        position: absolute;
        top: 5px;
        right: 5px;
        display: grid;
        place-items: center;
        width: 24px;
        min-width: 24px;
        height: 24px;
        min-height: 24px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        background: rgba(15, 23, 42, 0.46);
        color: #e5e7eb;
        padding: 0;
      }

      .copy-code-button:hover {
        border-color: rgba(255, 255, 255, 0.36);
        background: rgba(30, 41, 59, 0.84);
        color: #ffffff;
      }

      .copy-code-button svg {
        width: 14px;
        height: 14px;
        pointer-events: none;
      }

      .preview code {
        border-radius: 5px;
        background: #eef2f7;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        padding: 2px 5px;
      }

      .preview pre {
        overflow: auto;
        border-radius: 8px;
        background: #111827;
        color: #f8fafc;
        max-height: 280px;
        font-size: 11px;
        line-height: 1.36;
        padding: 26px 10px 10px;
      }

      .preview pre code {
        background: transparent;
        color: inherit;
        padding: 0;
      }

      .preview blockquote {
        border-left: 3px solid #9db4d0;
        color: #526170;
        padding-left: 12px;
      }

      .preview img {
        display: block;
        max-width: 100%;
        max-height: 520px;
        border: 1px solid #dce3eb;
        border-radius: 8px;
        object-fit: contain;
      }

      .image-popover {
        position: fixed;
        z-index: 30;
        right: 24px;
        top: 76px;
        display: none;
        width: min(420px, calc(100vw - 48px));
        max-height: min(520px, calc(100vh - 120px));
        overflow: auto;
        border: 1px solid #d8e0e8;
        border-radius: 12px;
        background: #ffffff;
        box-shadow: 0 20px 48px rgba(20, 36, 56, 0.18);
        padding: 12px;
      }

      .image-popover.open {
        display: grid;
        gap: 10px;
      }

      .image-popover-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: #344054;
        font-size: 13px;
        font-weight: 760;
      }

      .image-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .image-choice {
        display: grid;
        gap: 5px;
        min-height: 0;
        border-radius: 8px;
        padding: 6px;
      }

      .image-choice img {
        width: 100%;
        aspect-ratio: 1;
        border-radius: 6px;
        background: #f3f6fa;
        object-fit: cover;
      }

      .image-choice span {
        overflow: hidden;
        color: #526170;
        font-size: 10px;
        font-weight: 600;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .empty {
        display: grid;
        place-items: center;
        color: #607083;
        padding: 24px;
        text-align: center;
      }

      .storage-path {
        overflow-wrap: anywhere;
        color: #607083;
        font-size: 12px;
        line-height: 1.45;
      }

      @media (max-width: 640px) {
        .editor-body {
          grid-template-columns: 1fr;
        }

        .topbar {
          grid-template-columns: 1fr 1fr;
        }

        .title-input,
        .tag-input {
          grid-column: 1 / -1;
        }

        .markdown-editor {
          min-height: 320px;
          border-right: 0;
          border-bottom: 1px solid #dce3eb;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="categories">
        <section class="panel">
          <div class="mode-nav">
            <button type="button" id="imageButton">图片</button>
            <button type="button" id="designButton">设计</button>
            <button type="button" id="videoButton">视频</button>
            <button type="button" id="canvasButton">画布</button>
            <button type="button" class="active" id="textButton">文本</button>
          </div>
          <p class="storage-path" id="storagePathText">正在读取保存位置...</p>
        </section>
        <section class="panel">
          <div class="utility-row category-actions">
            <button type="button" class="primary" id="addCategoryButton">分类</button>
            <button type="button" id="showAddNoteButton">新笔记</button>
          </div>
          <div class="search-row">
            <input id="noteSearchInput" placeholder="搜索标题、内容、标签" />
            <button type="button" class="subtle-action" id="backupNotebookButton">备份</button>
          </div>
        </section>
        <section class="note-create-card" id="noteCreateCard">
          <select id="noteCategorySelect" aria-label="选择分类"></select>
          <select id="noteTemplateSelect" aria-label="选择模板">
            <option value="blank">空白</option>
            <option value="code">代码记录</option>
            <option value="prompt">Prompt 记录</option>
            <option value="plan">项目计划</option>
            <option value="bug">Bug 记录</option>
            <option value="meeting">会议纪要</option>
          </select>
          <input id="newNoteTitleInput" placeholder="笔记标题" />
          <div class="note-create-actions">
            <button type="button" class="primary" id="confirmAddNoteButton">创建</button>
            <button type="button" id="cancelAddNoteButton">取消</button>
          </div>
        </section>
        <div class="list" id="categoryList"></div>
      </aside>

      <button type="button" class="pane-resizer" id="categoryResizer" aria-label="调整分类宽度"></button>

      <section class="editor">
        <header class="topbar">
          <input class="title-input" id="noteTitleInput" placeholder="笔记标题" />
          <input class="tag-input" id="noteTagsInput" placeholder="标签，用逗号分隔" />
          <select class="code-language-select" id="codeLanguageSelect" aria-label="代码语言">
            <option value="javascript">JavaScript</option>
            <option value="typescript">TypeScript</option>
            <option value="python">Python</option>
            <option value="bash">Bash</option>
            <option value="json">JSON</option>
            <option value="markdown">Markdown</option>
            <option value="text">Text</option>
          </select>
          <button type="button" class="editor-action" id="boldButton">B</button>
          <input type="color" class="color-input" id="textColorInput" value="#ef4444" aria-label="文字颜色" />
          <button type="button" class="editor-action" id="applyColorButton">颜色</button>
          <button type="button" class="editor-action" id="headingOneButton">H1</button>
          <button type="button" class="editor-action" id="headingTwoButton">H2</button>
          <button type="button" class="editor-action" id="insertCodeBlockButton">代码块</button>
          <button type="button" class="editor-action" id="uploadNoteImageButton">上传图片</button>
          <button type="button" class="editor-action" id="recentImageButton">最近生成</button>
          <button type="button" class="editor-action" id="copyMarkdownButton">复制全文</button>
          <button type="button" class="editor-action" id="exportButton">导出 Markdown</button>
        </header>
        <div class="editor-body">
          <textarea class="markdown-editor" id="noteContentInput" placeholder="在这里写 Markdown..."></textarea>
          <article class="preview" id="preview"></article>
        </div>
      </section>
    </main>

    <div class="context-menu" id="categoryMenu" role="menu">
      <button type="button" id="renameCategoryMenuItem">改名</button>
      <button type="button" class="danger" id="deleteCategoryMenuItem">删除</button>
    </div>
    <div class="context-menu" id="noteMenu" role="menu">
      <button type="button" id="renameNoteMenuItem">改名</button>
      <button type="button" id="togglePinNoteMenuItem">置顶</button>
      <button type="button" id="toggleFavoriteNoteMenuItem">收藏</button>
      <button type="button" class="danger" id="deleteNoteMenuItem">删除笔记</button>
    </div>
    <input type="file" id="noteImageInput" accept="image/*" hidden />
    <div class="image-popover" id="recentImagePopover" role="dialog" aria-label="最近生成图片">
      <div class="image-popover-header">
        <span>最近生成</span>
        <button type="button" class="subtle-action" id="closeRecentImagePopover">关闭</button>
      </div>
      <div class="image-grid" id="recentImageGrid"></div>
    </div>

    <script>
      const storageKey = "cowart-markdown-notebook";
      const apiBase = location.protocol === "file:" ? "http://127.0.0.1:43219" : "";
      let data = loadNotebook();
      let activeCategoryId = data.activeCategoryId || data.categories[0]?.id;
      let activeNoteId = data.activeNoteId || data.categories[0]?.notes[0]?.id;
      let storagePath = data.storagePath || "";
      let saveTimer = null;
      let menuCategoryId = "";
      let menuNoteId = "";
      let editingCategoryId = "";
      let editingNoteId = "";
      let hasLocalChanges = false;
      let searchQuery = "";

      const categoryList = document.querySelector("#categoryList");
      const noteTitleInput = document.querySelector("#noteTitleInput");
      const noteTagsInput = document.querySelector("#noteTagsInput");
      const noteContentInput = document.querySelector("#noteContentInput");
      const preview = document.querySelector("#preview");
      const boldButton = document.querySelector("#boldButton");
      const textColorInput = document.querySelector("#textColorInput");
      const applyColorButton = document.querySelector("#applyColorButton");
      const headingOneButton = document.querySelector("#headingOneButton");
      const headingTwoButton = document.querySelector("#headingTwoButton");
      const insertCodeBlockButton = document.querySelector("#insertCodeBlockButton");
      const uploadNoteImageButton = document.querySelector("#uploadNoteImageButton");
      const recentImageButton = document.querySelector("#recentImageButton");
      const copyMarkdownButton = document.querySelector("#copyMarkdownButton");
      const exportButton = document.querySelector("#exportButton");
      const codeLanguageSelect = document.querySelector("#codeLanguageSelect");
      const storagePathText = document.querySelector("#storagePathText");
      const categoryMenu = document.querySelector("#categoryMenu");
      const noteMenu = document.querySelector("#noteMenu");
      const noteCreateCard = document.querySelector("#noteCreateCard");
      const noteCategorySelect = document.querySelector("#noteCategorySelect");
      const noteTemplateSelect = document.querySelector("#noteTemplateSelect");
      const newNoteTitleInput = document.querySelector("#newNoteTitleInput");
      const noteSearchInput = document.querySelector("#noteSearchInput");
      const backupNotebookButton = document.querySelector("#backupNotebookButton");
      const noteImageInput = document.querySelector("#noteImageInput");
      const recentImagePopover = document.querySelector("#recentImagePopover");
      const recentImageGrid = document.querySelector("#recentImageGrid");

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function startPaneResize(event, cssVar, min, max) {
        event.preventDefault();
        event.currentTarget.setPointerCapture?.(event.pointerId);
        const startX = event.clientX;
        const measuredWidth = cssVar.includes("category") ? document.querySelector(".categories").getBoundingClientRect().width : 320;
        const startValue = parseInt(getComputedStyle(document.documentElement).getPropertyValue(cssVar), 10) || measuredWidth;
        const onMove = (moveEvent) => {
          const next = clamp(startValue + moveEvent.clientX - startX, min, max);
          document.documentElement.style.setProperty(cssVar, `${Math.round(next)}px`);
          localStorage.setItem(`cowart-text-${cssVar}`, `${Math.round(next)}px`);
        };
        const onUp = () => {
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
        };
        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp, { once: true });
      }

      function restorePaneWidths() {
        for (const cssVar of ["--category-width", "--note-width"]) {
          const value = localStorage.getItem(`cowart-text-${cssVar}`);
          if (value) document.documentElement.style.setProperty(cssVar, value);
        }
      }

      function createId(prefix) {
        return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
      }

      function createDefaultNotebook() {
        const categoryId = createId("category");
        const noteId = createId("note");
        return {
          activeCategoryId: categoryId,
          activeNoteId: noteId,
          categories: [
            {
              id: categoryId,
              name: "默认分类",
              notes: [
                {
                  id: noteId,
                  title: "第一篇 Markdown",
                  content: "# 第一篇 Markdown\n\n- 可以建分类\n- 可以写多篇内容\n- 右侧会实时预览\n\n> 数据会保存到本机文件夹。",
                  tags: ["示例"],
                  pinned: false,
                  favorite: false,
                  updatedAt: new Date().toISOString(),
                },
              ],
            },
          ],
        };
      }

      function loadNotebook() {
        try {
          const parsed = JSON.parse(localStorage.getItem(storageKey) || "null");
          if (parsed?.categories?.length) return parsed;
        } catch {}
        return createDefaultNotebook();
      }

      function persistLocalBackup() {
        data.activeCategoryId = activeCategoryId;
        data.activeNoteId = activeNoteId;
        localStorage.setItem(storageKey, JSON.stringify(data, null, 2));
      }

      function isEditingText() {
        return [noteTitleInput, noteTagsInput, noteContentInput, newNoteTitleInput].includes(document.activeElement) || document.activeElement?.classList?.contains("inline-rename");
      }

      async function loadNotebookFromDisk(options = {}) {
        const { force = false, preserveSelection = true } = options;
        if (!force && (hasLocalChanges || isEditingText())) return;
        try {
          const response = await fetch(`${apiBase}/api/notebook`, { cache: "no-store" });
          const next = await response.json();
          if (!response.ok || next.error) throw new Error(next.error || "读取文本失败");
          const previousNoteId = activeNoteId;
          data = normalizeNotebook(next);
          storagePath = next.storagePath || "";
          if (preserveSelection && previousNoteId && noteById(previousNoteId)) {
            activeNoteId = previousNoteId;
            activeCategoryId = categoryForNote(previousNoteId)?.id || data.activeCategoryId || data.categories[0]?.id;
          } else {
            activeCategoryId = data.activeCategoryId || data.categories[0]?.id;
            activeNoteId = data.activeNoteId || data.categories[0]?.notes[0]?.id;
          }
          hasLocalChanges = false;
          persistLocalBackup();
          renderAll();
        } catch (error) {
          storagePath = "";
          renderAll();
        }
      }

      function normalizeNotebook(value) {
        if (!value || !Array.isArray(value.categories) || value.categories.length === 0) return createDefaultNotebook();
        return {
          activeCategoryId: value.activeCategoryId,
          activeNoteId: value.activeNoteId,
          categories: value.categories.map((category) => ({
            id: String(category.id || createId("category")),
            name: String(category.name || "未命名分类"),
            notes: Array.isArray(category.notes)
              ? category.notes.map((note) => ({
                  id: String(note.id || createId("note")),
	                  title: String(note.title || "未命名笔记"),
	                  content: String(note.content || ""),
	                  tags: Array.isArray(note.tags) ? note.tags.map(String).filter(Boolean) : [],
	                  pinned: Boolean(note.pinned),
	                  favorite: Boolean(note.favorite),
	                  updatedAt: String(note.updatedAt || new Date().toISOString()),
	                  filePath: note.filePath || "",
                }))
              : [],
          })),
        };
      }

      function saveNotebook() {
        hasLocalChanges = true;
        persistLocalBackup();
        scheduleDiskSave();
      }

      function scheduleDiskSave() {
        window.clearTimeout(saveTimer);
        saveTimer = window.setTimeout(() => {
          saveNotebookToDisk().catch(() => {});
        }, 250);
      }

      async function saveNotebookToDisk() {
        const response = await fetch(`${apiBase}/api/notebook`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const next = await response.json();
        if (!response.ok || next.error) throw new Error(next.error || "保存文本失败");
        storagePath = next.storagePath || storagePath;
        hasLocalChanges = false;
        return next;
      }

      function activeCategory() {
        return data.categories.find((category) => category.id === activeCategoryId) || data.categories[0];
      }

      function selectNote(categoryId, noteId) {
        activeCategoryId = categoryId;
        activeNoteId = noteId;
        renderAll();
      }

      function categoryById(id) {
        return data.categories.find((category) => category.id === id);
      }

      function categoryForNote(noteId) {
        return data.categories.find((category) => category.notes.some((note) => note.id === noteId));
      }

      function noteById(noteId) {
        return categoryForNote(noteId)?.notes.find((note) => note.id === noteId);
      }

      function activeNote() {
        const category = activeCategory();
        return category?.notes.find((note) => note.id === activeNoteId) || category?.notes[0];
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderMarkdown(markdown) {
        const lines = String(markdown || "").split(/\r?\n/);
        const html = [];
        const headings = [];
        let inCode = false;
        let listOpen = false;
        const copyIcon =
          '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="8" y="8" width="10" height="10" rx="2" stroke="currentColor" stroke-width="2"/><path d="M6 16H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
        const makeHeadingId = (text) =>
          `h-${headings.length + 1}-${text
            .toLowerCase()
            .replace(/[^\p{L}\p{N}]+/gu, "-")
            .replace(/^-|-$/g, "")
            .slice(0, 42) || "heading"}`;
        for (const rawLine of lines) {
          const line = rawLine;
          if (line.trim().startsWith("```")) {
            if (listOpen) {
              html.push("</ul>");
              listOpen = false;
            }
            html.push(inCode ? "</code></pre></div>" : `<div class="code-block"><button type="button" class="copy-code-button" aria-label="复制代码" title="复制代码">${copyIcon}</button><pre><code>`);
            inCode = !inCode;
            continue;
          }
          if (inCode) {
            html.push(`${escapeHtml(line)}\n`);
            continue;
          }
          if (/^\s*[-*]\s+/.test(line)) {
            if (!listOpen) {
              html.push("<ul>");
              listOpen = true;
            }
            html.push(`<li>${inlineMarkdown(line.replace(/^\s*[-*]\s+/, ""))}</li>`);
            continue;
          }
          if (listOpen) {
            html.push("</ul>");
            listOpen = false;
          }
          if (line.startsWith("### ")) html.push(`<h3>${inlineMarkdown(line.slice(4))}</h3>`);
          else if (line.startsWith("## ")) {
            const text = line.slice(3);
            const id = makeHeadingId(text);
            headings.push({ id, level: 2, text });
            html.push(`<h2 id="${escapeHtml(id)}">${inlineMarkdown(text)}</h2>`);
	          } else if (line.startsWith("# ")) {
	            const text = line.slice(2);
	            const id = makeHeadingId(text);
	            headings.push({ id, level: 1, text });
	            html.push(`<h1 id="${escapeHtml(id)}">${inlineMarkdown(text)}</h1>`);
	          }
	          else if (/^!\[[^\]]*\]\([^)]+\)\s*$/.test(line.trim())) {
	            const match = line.trim().match(/^!\[([^\]]*)\]\(([^)]+)\)\s*$/);
	            html.push(`<p><img src="${escapeHtml(match?.[2] || "")}" alt="${escapeHtml(match?.[1] || "")}" loading="lazy" /></p>`);
	          }
	          else if (line.startsWith("> ")) html.push(`<blockquote>${inlineMarkdown(line.slice(2))}</blockquote>`);
          else if (line.trim() === "") html.push("");
          else html.push(`<p>${inlineMarkdown(line)}</p>`);
        }
        if (listOpen) html.push("</ul>");
        if (inCode) html.push("</code></pre></div>");
        const toc =
          headings.length > 1
            ? `<nav class="toc"><strong>目录</strong>${headings
                .map((heading) => `<a class="level-${heading.level}" href="#${escapeHtml(heading.id)}">${escapeHtml(heading.text)}</a>`)
                .join("")}</nav>`
            : "";
        return `${toc}${html.join("\n")}`;
      }

      function inlineMarkdown(value) {
        return escapeHtml(value)
          .replace(/&lt;span style=&quot;color:\s*(#[0-9a-fA-F]{6})&quot;&gt;([\s\S]*?)&lt;\/span&gt;/g, '<span style="color:$1">$2</span>')
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
          .replace(/\*([^*]+)\*/g, "<em>$1</em>");
      }

      function normalizedSearch(value) {
        return String(value || "").trim().toLowerCase();
      }

      function noteSearchText(note, category) {
        return [category?.name, note.title, note.content, ...(note.tags || [])].join(" ").toLowerCase();
      }

      function noteMatchesSearch(note, category) {
        const query = normalizedSearch(searchQuery);
        if (!query) return true;
        return noteSearchText(note, category).includes(query);
      }

      function categoryMatchesSearch(category) {
        const query = normalizedSearch(searchQuery);
        if (!query) return true;
        return category.name.toLowerCase().includes(query) || category.notes.some((note) => noteMatchesSearch(note, category));
      }

      function sortedNotes(notes) {
        return [...notes].sort((left, right) => {
          if (Boolean(left.pinned) !== Boolean(right.pinned)) return left.pinned ? -1 : 1;
          return new Date(right.updatedAt).getTime() - new Date(left.updatedAt).getTime();
        });
      }

      function formatNoteMeta(note) {
        const parts = [];
        if (note.pinned) parts.push("置顶");
        if (note.favorite) parts.push("收藏");
        if (note.tags?.length) parts.push(note.tags.map((tag) => `#${tag}`).join(" "));
        return parts.join(" · ");
      }

      function renderCategories() {
        categoryList.innerHTML = "";
        for (const category of data.categories) {
          if (!categoryMatchesSearch(category)) continue;
          const group = document.createElement("div");
          group.className = "category-group";
          const visibleNotes = sortedNotes(category.notes).filter((note) => noteMatchesSearch(note, category));

          if (editingCategoryId === category.id) {
            const input = document.createElement("input");
            input.className = "inline-rename";
            input.value = category.name;
            input.addEventListener("keydown", (event) => {
              if (event.key === "Enter") input.blur();
              if (event.key === "Escape") {
                editingCategoryId = "";
                renderCategories();
              }
            });
            input.addEventListener("blur", () => finishRenameCategory(category, input.value));
            group.appendChild(input);
            setTimeout(() => {
              input.focus();
              input.select();
            }, 0);
          } else {
            const button = document.createElement("button");
            button.type = "button";
            button.className = `item category-item ${category.id === activeCategoryId ? "active" : ""}`;
            button.innerHTML = `<strong>${escapeHtml(category.name)}</strong><span>${visibleNotes.length}/${category.notes.length} 篇</span>`;
            button.addEventListener("click", () => {
              selectNote(category.id, category.notes[0]?.id);
            });
            button.addEventListener("contextmenu", (event) => {
              event.preventDefault();
              activeCategoryId = category.id;
              activeNoteId = category.notes[0]?.id;
              menuCategoryId = category.id;
              renderAll();
              showContextMenu(categoryMenu, event.clientX, event.clientY);
            });
            group.appendChild(button);
          }

          if (category.id === activeCategoryId || searchQuery) {
            const noteListElement = document.createElement("div");
            noteListElement.className = "category-note-list";
            if (visibleNotes.length === 0) {
              noteListElement.innerHTML = searchQuery ? "<div class='empty'>没有匹配的笔记。</div>" : "<div class='empty'>这个分类里还没有笔记。</div>";
            }
            for (const note of visibleNotes) {
              if (editingNoteId === note.id) {
                const input = document.createElement("input");
                input.className = "inline-rename note-rename-input";
                input.value = note.title || "未命名笔记";
                input.addEventListener("keydown", (event) => {
                  if (event.key === "Enter") input.blur();
                  if (event.key === "Escape") {
                    editingNoteId = "";
                    renderCategories();
                  }
                });
                input.addEventListener("blur", () => finishRenameNote(note, input.value));
                noteListElement.appendChild(input);
                setTimeout(() => {
                  input.focus();
                  input.select();
                }, 0);
                continue;
              }
              const noteButton = document.createElement("button");
              noteButton.type = "button";
              noteButton.className = `note-tree-item ${note.id === activeNoteId ? "active" : ""}`;
              const meta = formatNoteMeta(note);
              noteButton.innerHTML = `<strong>${note.favorite ? "★ " : ""}${escapeHtml(note.title || "未命名笔记")}</strong><span>${new Date(note.updatedAt).toLocaleDateString()}</span>${meta ? `<div class="note-meta-line">${escapeHtml(meta)}</div>` : ""}`;
              noteButton.addEventListener("click", () => {
                selectNote(category.id, note.id);
              });
              noteButton.addEventListener("dblclick", () => {
                renameNote(note);
              });
              noteButton.addEventListener("contextmenu", (event) => {
                event.preventDefault();
                activeCategoryId = category.id;
                activeNoteId = note.id;
		                menuNoteId = note.id;
		                renderAll();
		                updateNoteMenuLabels(note);
		                showContextMenu(noteMenu, event.clientX, event.clientY);
	              });
              noteListElement.appendChild(noteButton);
            }
            group.appendChild(noteListElement);
          }

          categoryList.appendChild(group);
        }
      }

      function renderEditor() {
        const note = activeNote();
        const disabled = !note;
        noteTitleInput.disabled = disabled;
        noteTagsInput.disabled = disabled;
        noteContentInput.disabled = disabled;
        codeLanguageSelect.disabled = disabled;
        boldButton.disabled = disabled;
        textColorInput.disabled = disabled;
        applyColorButton.disabled = disabled;
        headingOneButton.disabled = disabled;
        headingTwoButton.disabled = disabled;
        insertCodeBlockButton.disabled = disabled;
        copyMarkdownButton.disabled = disabled;
        exportButton.disabled = disabled;
        if (!note) {
          noteTitleInput.value = "";
          noteTagsInput.value = "";
          noteContentInput.value = "";
          preview.innerHTML = "<div class='empty'>选择或新建一篇笔记。</div>";
          return;
        }
        noteTitleInput.value = note.title;
        noteTagsInput.value = (note.tags || []).join(", ");
        noteContentInput.value = note.content;
        preview.innerHTML = renderMarkdown(note.content);
      }

      function renderAll() {
        renderCategoryOptions();
        renderCategories();
        renderEditor();
        storagePathText.textContent = storagePath ? `保存位置：${storagePath}` : "本地文件服务未连接，暂存在浏览器。";
        exportButton.textContent = storagePath ? "导出 Markdown" : "导出 Markdown";
        backupNotebookButton.textContent = "备份";
      }

      function addCategory() {
        const name = nextCategoryName();
        const category = { id: createId("category"), name, notes: [] };
        data.categories.unshift(category);
        activeCategoryId = category.id;
        activeNoteId = undefined;
        editingCategoryId = category.id;
        saveNotebook();
        renderAll();
      }

      function renderCategoryOptions() {
        noteCategorySelect.innerHTML = "";
        for (const category of data.categories) {
          const option = document.createElement("option");
          option.value = category.id;
          option.textContent = category.name;
          option.selected = category.id === activeCategoryId;
          noteCategorySelect.appendChild(option);
        }
      }

      function nextCategoryName() {
        const base = "分类";
        if (!data.categories.some((category) => category.name === base)) return base;
        let index = data.categories.length + 1;
        while (data.categories.some((category) => category.name === `${base} ${index}`)) index += 1;
        return `${base} ${index}`;
      }

      function renameCategory(category = activeCategory()) {
        if (!category) return;
        hideCategoryMenu();
        editingCategoryId = category.id;
        editingNoteId = "";
        renderCategories();
      }

      function finishRenameCategory(category, value) {
        const name = value.trim();
        editingCategoryId = "";
        if (!name) return;
        category.name = name;
        saveNotebook();
        renderAll();
      }

      function renameNote(note = activeNote()) {
        if (!note) return;
        hideMenus();
        editingCategoryId = "";
        editingNoteId = note.id;
        activeCategoryId = categoryForNote(note.id)?.id || activeCategoryId;
        activeNoteId = note.id;
        renderAll();
      }

      function finishRenameNote(note, value) {
        const title = value.trim();
        editingNoteId = "";
        if (!title) {
          renderCategories();
          return;
        }
        note.title = title;
        note.updatedAt = new Date().toISOString();
        saveNotebook();
        renderAll();
      }

      function deleteCategory(category = activeCategory()) {
        if (!category) return;
        hideCategoryMenu();
        if (!window.confirm(`确定删除分类“${category.name}”以及其中 ${category.notes.length} 篇笔记吗？`)) return;
        data.categories = data.categories.filter((item) => item.id !== category.id);
        if (data.categories.length === 0) data = createDefaultNotebook();
        activeCategoryId = data.categories[0]?.id;
        activeNoteId = data.categories[0]?.notes[0]?.id;
        saveNotebook();
        renderAll();
      }

      function showContextMenu(menu, x, y) {
        const padding = 8;
        hideMenus();
        menu.classList.add("open");
        const rect = menu.getBoundingClientRect();
        menu.style.left = `${Math.min(x, window.innerWidth - rect.width - padding)}px`;
        menu.style.top = `${Math.min(y, window.innerHeight - rect.height - padding)}px`;
      }

      function hideCategoryMenu() {
        hideMenus();
      }

      function hideMenus() {
        categoryMenu.classList.remove("open");
        noteMenu.classList.remove("open");
      }

      function menuCategory() {
        return categoryById(menuCategoryId) || activeCategory();
      }

      function menuNote() {
        return noteById(menuNoteId) || activeNote();
      }

      function updateNoteMenuLabels(note = menuNote()) {
        document.querySelector("#togglePinNoteMenuItem").textContent = note?.pinned ? "取消置顶" : "置顶";
        document.querySelector("#toggleFavoriteNoteMenuItem").textContent = note?.favorite ? "取消收藏" : "收藏";
      }

      function showAddNoteForm() {
        renderCategoryOptions();
        noteCreateCard.classList.add("open");
        noteCategorySelect.value = activeCategoryId || data.categories[0]?.id || "";
        newNoteTitleInput.value = "";
        newNoteTitleInput.placeholder = "笔记标题，留空则用“新笔记”";
        setTimeout(() => newNoteTitleInput.focus(), 0);
      }

      function hideAddNoteForm() {
        noteCreateCard.classList.remove("open");
      }

      function templateContent(template, title) {
        const safeTitle = title.trim() || "新笔记";
        const templates = {
          blank: `# ${safeTitle}\n\n`,
          code: `# ${safeTitle}\n\n## 目标\n\n## 代码\n\n\`\`\`javascript\n// code\n\`\`\`\n\n## 备注\n\n`,
          prompt: `# ${safeTitle}\n\n## 正向提示词\n\n## 反向提示词\n\n## 参数\n\n## 结果记录\n\n`,
          plan: `# ${safeTitle}\n\n## 目标\n\n## 步骤\n\n- \n\n## 验证\n\n`,
          bug: `# ${safeTitle}\n\n## 现象\n\n## 复现步骤\n\n## 原因\n\n## 修复\n\n`,
          meeting: `# ${safeTitle}\n\n## 结论\n\n## 待办\n\n- \n\n## 记录\n\n`,
        };
        return templates[template] || templates.blank;
      }

      function addNote(categoryId = activeCategoryId, title = "新笔记", template = "blank") {
        const category = categoryById(categoryId) || activeCategory();
        if (!category) return;
        const note = {
          id: createId("note"),
          title: title.trim() || "新笔记",
          content: templateContent(template, title || "新笔记"),
          tags: [],
          pinned: false,
          favorite: false,
          updatedAt: new Date().toISOString(),
        };
        category.notes.unshift(note);
        activeCategoryId = category.id;
        activeNoteId = note.id;
        saveNotebook();
        renderAll();
      }

      function confirmAddNote() {
        addNote(noteCategorySelect.value, newNoteTitleInput.value || "新笔记", noteTemplateSelect.value);
        hideAddNoteForm();
      }

      function deleteNote(note = activeNote()) {
        const category = note ? categoryForNote(note.id) : activeCategory();
        if (!category || !note) return;
        hideMenus();
        if (!window.confirm(`确定删除笔记“${note.title || "未命名笔记"}”吗？`)) return;
        category.notes = category.notes.filter((item) => item.id !== note.id);
        activeCategoryId = category.id;
        activeNoteId = category.notes[0]?.id;
        saveNotebook();
        renderAll();
      }

      function togglePinNote(note = activeNote()) {
        if (!note) return;
        hideMenus();
        note.pinned = !note.pinned;
        note.updatedAt = new Date().toISOString();
        saveNotebook();
        renderAll();
      }

      function toggleFavoriteNote(note = activeNote()) {
        if (!note) return;
        hideMenus();
        note.favorite = !note.favorite;
        note.updatedAt = new Date().toISOString();
        saveNotebook();
        renderAll();
      }

      function parseTags(value) {
        return String(value || "")
          .split(/[,，]/)
          .map((tag) => tag.trim())
          .filter(Boolean)
          .slice(0, 12);
      }

      function updateActiveNote() {
        const note = activeNote();
        if (!note) return;
        note.title = noteTitleInput.value;
        note.content = noteContentInput.value;
        note.tags = parseTags(noteTagsInput.value);
        note.updatedAt = new Date().toISOString();
        preview.innerHTML = renderMarkdown(note.content);
        saveNotebook();
        renderCategories();
      }

      function insertCodeBlock() {
        const note = activeNote();
        if (!note) return;
        const start = noteContentInput.selectionStart ?? noteContentInput.value.length;
        const end = noteContentInput.selectionEnd ?? start;
        const before = noteContentInput.value.slice(0, start);
        const selected = noteContentInput.value.slice(start, end);
        const after = noteContentInput.value.slice(end);
        const prefix = before && !before.endsWith("\n") ? "\n\n" : "";
        const suffix = after && !after.startsWith("\n") ? "\n\n" : "";
        const code = selected || "// code";
        const language = codeLanguageSelect.value || "text";
        const block = `${prefix}\`\`\`${language}\n${code}\n\`\`\`${suffix}`;
        noteContentInput.value = `${before}${block}${after}`;
        const cursor = selected ? start + block.length : start + prefix.length + `\`\`\`${language}\n`.length;
        noteContentInput.focus();
        noteContentInput.setSelectionRange(cursor, selected ? cursor : cursor + code.length);
        updateActiveNote();
      }

      function insertAtCursor(markdown) {
        const note = activeNote();
        if (!note) return;
        const start = noteContentInput.selectionStart ?? noteContentInput.value.length;
        const end = noteContentInput.selectionEnd ?? start;
        const before = noteContentInput.value.slice(0, start);
        const after = noteContentInput.value.slice(end);
        const prefix = before && !before.endsWith("\n") ? "\n\n" : "";
        const suffix = after && !after.startsWith("\n") ? "\n\n" : "";
        noteContentInput.value = `${before}${prefix}${markdown}${suffix}${after}`;
        const cursor = start + prefix.length + markdown.length;
        noteContentInput.focus();
        noteContentInput.setSelectionRange(cursor, cursor);
        updateActiveNote();
      }

      function wrapSelection(prefix, suffix, placeholder = "文字") {
        const note = activeNote();
        if (!note) return;
        const start = noteContentInput.selectionStart ?? noteContentInput.value.length;
        const end = noteContentInput.selectionEnd ?? start;
        const before = noteContentInput.value.slice(0, start);
        const selected = noteContentInput.value.slice(start, end) || placeholder;
        const after = noteContentInput.value.slice(end);
        const next = `${prefix}${selected}${suffix}`;
        noteContentInput.value = `${before}${next}${after}`;
        const selectionStart = start + prefix.length;
        const selectionEnd = selectionStart + selected.length;
        noteContentInput.focus();
        noteContentInput.setSelectionRange(selectionStart, selectionEnd);
        updateActiveNote();
      }

      function applyBold() {
        wrapSelection("**", "**", "加粗文字");
      }

      function applyTextColor() {
        const color = /^#[0-9a-fA-F]{6}$/.test(textColorInput.value) ? textColorInput.value : "#ef4444";
        wrapSelection(`<span style="color:${color}">`, "</span>", "彩色文字");
      }

      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      async function uploadNoteImage(file) {
        if (!file || !file.type.startsWith("image/")) return;
        uploadNoteImageButton.disabled = true;
        const originalText = uploadNoteImageButton.textContent;
        uploadNoteImageButton.textContent = "上传中";
        try {
          const dataUrl = await fileToDataUrl(file);
          const response = await fetch(`${apiBase}/api/notebook-image`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: file.name, dataUrl }),
          });
          const result = await response.json();
          if (!response.ok || result.error) throw new Error(result.error || "上传图片失败");
          insertAtCursor(`![${file.name.replace(/\.[^.]+$/, "")}](${result.markdownUrl})`);
          uploadNoteImageButton.textContent = "已插入";
        } catch (error) {
          uploadNoteImageButton.textContent = "上传失败";
        } finally {
          window.setTimeout(() => {
            uploadNoteImageButton.disabled = false;
            uploadNoteImageButton.textContent = originalText;
            noteImageInput.value = "";
          }, 1200);
        }
      }

      async function showRecentImages() {
        recentImagePopover.classList.add("open");
        recentImageGrid.innerHTML = "<div class='empty'>正在读取...</div>";
        try {
          const response = await fetch(`${apiBase}/api/recent-images`, { cache: "no-store" });
          const result = await response.json();
          if (!response.ok || result.error) throw new Error(result.error || "读取最近生成失败");
          const images = Array.isArray(result.images) ? result.images.slice(0, 24) : [];
          if (images.length === 0) {
            recentImageGrid.innerHTML = "<div class='empty'>没有最近生成图片。</div>";
            return;
          }
          recentImageGrid.innerHTML = "";
          for (const image of images) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "image-choice";
            button.innerHTML = `<img src="${escapeHtml(image.url)}" alt="" loading="lazy" /><span>${escapeHtml(image.name || "图片")}</span>`;
            button.addEventListener("click", () => {
              insertAtCursor(`![${image.name || "最近生成图片"}](${image.url})`);
              recentImagePopover.classList.remove("open");
            });
            recentImageGrid.appendChild(button);
          }
        } catch {
          recentImageGrid.innerHTML = "<div class='empty'>读取失败。</div>";
        }
      }

      function insertHeading(level) {
        const note = activeNote();
        if (!note) return;
        const marker = `${"#".repeat(level)} `;
        const value = noteContentInput.value;
        const start = noteContentInput.selectionStart ?? 0;
        const end = noteContentInput.selectionEnd ?? start;
        const lineStart = value.lastIndexOf("\n", Math.max(0, start - 1)) + 1;
        const lineEndIndex = value.indexOf("\n", end);
        const lineEnd = lineEndIndex === -1 ? value.length : lineEndIndex;
        const original = value.slice(lineStart, lineEnd);
        const clean = original.replace(/^#{1,6}\s+/, "");
        const nextLine = `${marker}${clean || "标题"}`;
        noteContentInput.value = `${value.slice(0, lineStart)}${nextLine}${value.slice(lineEnd)}`;
        const cursor = lineStart + nextLine.length;
        noteContentInput.focus();
        noteContentInput.setSelectionRange(cursor, cursor);
        updateActiveNote();
      }

      async function copyCodeBlock(button) {
        const code = button.closest(".code-block")?.querySelector("code")?.textContent || "";
        if (!code) return;
        try {
          await navigator.clipboard.writeText(code);
        } catch {
          const textarea = document.createElement("textarea");
          textarea.value = code;
          textarea.style.position = "fixed";
          textarea.style.opacity = "0";
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand("copy");
          textarea.remove();
        }
        const originalHtml = button.innerHTML;
        button.innerHTML = '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        button.setAttribute("aria-label", "已复制");
        button.setAttribute("title", "已复制");
        window.setTimeout(() => {
          button.innerHTML = originalHtml;
          button.setAttribute("aria-label", "复制代码");
          button.setAttribute("title", "复制代码");
        }, 1200);
      }

      async function copyMarkdown() {
        const note = activeNote();
        if (!note) return;
        const originalText = copyMarkdownButton.textContent;
        try {
          await navigator.clipboard.writeText(note.content || "");
        } catch {
          const textarea = document.createElement("textarea");
          textarea.value = note.content || "";
          textarea.style.position = "fixed";
          textarea.style.opacity = "0";
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand("copy");
          textarea.remove();
        }
        copyMarkdownButton.textContent = "已复制";
        window.setTimeout(() => {
          copyMarkdownButton.textContent = originalText;
        }, 1200);
      }

      async function backupNotebook() {
        const originalText = backupNotebookButton.textContent;
        backupNotebookButton.disabled = true;
        backupNotebookButton.textContent = "备份中";
        try {
          await saveNotebookToDisk();
          const response = await fetch(`${apiBase}/api/notebook-backup`, { method: "POST" });
          const result = await response.json();
          if (!response.ok || result.error) throw new Error(result.error || "备份失败");
          backupNotebookButton.textContent = "已备份";
          storagePathText.textContent = `备份位置：${result.backupPath}`;
        } catch (error) {
          backupNotebookButton.textContent = "备份失败";
          storagePathText.textContent = error instanceof Error ? error.message : "备份失败";
        } finally {
          window.setTimeout(() => {
            backupNotebookButton.disabled = false;
            backupNotebookButton.textContent = originalText;
            renderAll();
          }, 1800);
        }
      }

      function exportMarkdown() {
        const note = activeNote();
        if (!note) return;
        const blob = new Blob([note.content], { type: "text/markdown" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `${(note.title || "note").replace(/[\\/:*?"<>|]+/g, "-")}.md`;
        link.click();
        URL.revokeObjectURL(url);
      }

      document.querySelector("#imageButton").addEventListener("click", () => {
        window.location.href = location.protocol === "file:" ? `${apiBase}/image-generator.html` : "/image-generator.html";
      });
      document.querySelector("#designButton").addEventListener("click", () => {
        window.location.href = location.protocol === "file:" ? `${apiBase}/product-detail-generator.html` : "/product-detail-generator.html";
      });
      document.querySelector("#videoButton").addEventListener("click", () => {
        window.location.href = location.protocol === "file:" ? `${apiBase}/?installed=1&video=1` : "/?installed=1&video=1";
      });
      document.querySelector("#canvasButton").addEventListener("click", () => {
        window.location.href = location.protocol === "file:" ? `${apiBase}/?installed=1` : "/?installed=1";
      });
      document.querySelector("#addCategoryButton").addEventListener("click", addCategory);
      document.querySelector("#renameCategoryMenuItem").addEventListener("click", () => renameCategory(menuCategory()));
      document.querySelector("#deleteCategoryMenuItem").addEventListener("click", () => deleteCategory(menuCategory()));
      document.querySelector("#showAddNoteButton").addEventListener("click", showAddNoteForm);
      document.querySelector("#confirmAddNoteButton").addEventListener("click", confirmAddNote);
      document.querySelector("#cancelAddNoteButton").addEventListener("click", hideAddNoteForm);
      document.querySelector("#renameNoteMenuItem").addEventListener("click", () => renameNote(menuNote()));
      document.querySelector("#togglePinNoteMenuItem").addEventListener("click", () => togglePinNote(menuNote()));
      document.querySelector("#toggleFavoriteNoteMenuItem").addEventListener("click", () => toggleFavoriteNote(menuNote()));
      document.querySelector("#deleteNoteMenuItem").addEventListener("click", () => deleteNote(menuNote()));
      noteSearchInput.addEventListener("input", () => {
        searchQuery = noteSearchInput.value;
        renderCategories();
      });
      backupNotebookButton.addEventListener("click", backupNotebook);
      boldButton.addEventListener("click", applyBold);
      applyColorButton.addEventListener("click", applyTextColor);
      headingOneButton.addEventListener("click", () => insertHeading(1));
      headingTwoButton.addEventListener("click", () => insertHeading(2));
      insertCodeBlockButton.addEventListener("click", insertCodeBlock);
      uploadNoteImageButton.addEventListener("click", () => noteImageInput.click());
      recentImageButton.addEventListener("click", showRecentImages);
      document.querySelector("#closeRecentImagePopover").addEventListener("click", () => recentImagePopover.classList.remove("open"));
      noteImageInput.addEventListener("change", () => uploadNoteImage(noteImageInput.files?.[0]));
      copyMarkdownButton.addEventListener("click", copyMarkdown);
      document.querySelector("#exportButton").addEventListener("click", exportMarkdown);
      preview.addEventListener("click", (event) => {
        const button = event.target.closest(".copy-code-button");
        if (button) copyCodeBlock(button);
      });
      noteTitleInput.addEventListener("input", updateActiveNote);
      noteTagsInput.addEventListener("input", updateActiveNote);
      noteContentInput.addEventListener("input", updateActiveNote);
      noteContentInput.addEventListener("paste", (event) => {
        const image = [...(event.clipboardData?.files || [])].find((file) => file.type.startsWith("image/"));
        if (!image) return;
        event.preventDefault();
        uploadNoteImage(image);
      });
      newNoteTitleInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") confirmAddNote();
        if (event.key === "Escape") hideAddNoteForm();
      });
      document.querySelector("#categoryResizer").addEventListener("pointerdown", (event) => startPaneResize(event, "--category-width", 220, 620));
      window.addEventListener("click", (event) => {
        if (!categoryMenu.contains(event.target) && !noteMenu.contains(event.target)) hideMenus();
      });
      window.addEventListener("scroll", hideMenus, true);
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          hideMenus();
          hideAddNoteForm();
        }
      });
      window.addEventListener("focus", () => loadNotebookFromDisk());
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") loadNotebookFromDisk();
      });
      window.addEventListener("storage", (event) => {
        if (event.key === storageKey) loadNotebookFromDisk({ force: true });
      });
      window.setInterval(() => loadNotebookFromDisk(), 5000);

      restorePaneWidths();
      renderAll();
      loadNotebookFromDisk({ force: true, preserveSelection: false });
    </script>
  </body>
</html>
