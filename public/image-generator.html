<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cowart Image Generator</title>
    <style>
      :root {
        color: #202938;
        background: #f3f6f8;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid #d4dce6;
        border-radius: 8px;
        background: #ffffff;
        color: #243244;
        cursor: pointer;
        font-weight: 760;
        min-height: 38px;
        padding: 0 12px;
      }

      button:hover {
        border-color: #9db6df;
        background: #eef5ff;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .app {
        display: grid;
        grid-template-columns: var(--sidebar-width, 380px) 8px minmax(0, 1fr);
        height: 100vh;
        min-height: 720px;
      }

      .sidebar {
        overflow: auto;
        border-right: 1px solid #dce3eb;
        background: #ffffff;
      }

      .sidebar-resizer {
        width: 8px;
        border: 0;
        border-left: 1px solid #dce3eb;
        border-right: 1px solid #e8eef5;
        background: #f2f5f8;
        cursor: col-resize;
        padding: 0;
      }

      .sidebar-resizer::before {
        display: block;
        width: 2px;
        height: 34px;
        margin: calc(50vh - 17px) auto 0;
        border-radius: 999px;
        background: #aab6c4;
        content: "";
      }

      .header,
      .section {
        display: grid;
        gap: 12px;
        border-bottom: 1px solid #edf1f5;
        padding: 18px;
      }

      .header {
        padding: 16px 20px;
      }

      .title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .mode-nav {
        display: flex;
        gap: 8px;
      }

      .mode-nav button {
        flex: 0 0 60px;
        width: 60px;
        min-height: 34px;
        padding: 0 10px;
        color: #24313f;
        font-size: 13px;
        font-weight: 780;
      }

      .mode-nav button.active {
        border-color: #1f6feb;
        background: #eaf2ff;
        color: #164ea6;
      }


      h1 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0;
      }

      h2 {
        margin: 0;
        font-size: 14px;
      }

      p {
        margin: 0;
        color: #647587;
        font-size: 13px;
        line-height: 1.55;
      }

      label {
        display: grid;
        gap: 7px;
        color: #314050;
        font-size: 13px;
        font-weight: 740;
      }

      textarea,
      input,
      select {
        width: 100%;
        border: 1px solid #d7dee7;
        border-radius: 8px;
        background: #f8fafc;
        color: #26313d;
        outline: none;
        padding: 10px 11px;
      }

      textarea {
        min-height: 132px;
        resize: vertical;
      }

      textarea:focus,
      input:focus,
      select:focus {
        border-color: #1f6feb;
        box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.12);
      }

      .button-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .provider-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 104px;
        gap: 8px;
        align-items: end;
      }

      .provider-row button {
        min-height: 38px;
      }

      .primary {
        border-color: #1f6feb;
        background: #2872ee;
        color: #ffffff;
      }

      .primary:hover {
        background: #1f64d5;
        color: #ffffff;
      }

      .drop-zone {
        display: grid;
        place-items: center;
        min-height: 184px;
        border: 1px dashed #aebed0;
        border-radius: 10px;
        background: #f8fafc;
        color: #526170;
        text-align: center;
        padding: 16px;
      }

      .drop-zone.dragging {
        border-color: #1f6feb;
        background: #eef5ff;
      }

      .source-preview {
        display: none;
        gap: 10px;
      }

      .source-preview.visible {
        display: grid;
      }

      .source-preview img {
        width: 100%;
        max-height: 260px;
        border: 1px solid #d8e0e8;
        border-radius: 8px;
        background: #121720;
        object-fit: contain;
      }

      .reference-list {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        border: 1px dashed #c4d0dd;
        border-radius: 10px;
        background: #f8fafc;
        padding: 8px;
      }

      .reference-card {
        position: relative;
        display: grid;
        gap: 4px;
        min-width: 0;
        border: 1px solid #d8e0e8;
        border-radius: 9px;
        background: #fbfcfe;
        padding: 5px;
      }

      .reference-list.dragging {
        border-color: #1f6feb;
        background: #eef5ff;
      }

      .reference-card.empty {
        min-height: 84px;
        place-items: center;
        border-style: dashed;
        color: #7a8796;
        font-size: 11px;
        font-weight: 720;
        text-align: center;
        cursor: pointer;
      }

      .reference-card img {
        width: 100%;
        aspect-ratio: 1;
        border-radius: 6px;
        background: #121720;
        object-fit: cover;
      }

      .reference-card span {
        overflow: hidden;
        color: #314050;
        font-size: 10px;
        font-weight: 720;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .reference-card button {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 22px;
        min-width: 22px;
        height: 22px;
        min-height: 22px;
        overflow: hidden;
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.92);
        color: #b42318;
        font-size: 0;
        padding: 0;
      }

      .reference-card button::before {
        font-size: 14px;
        line-height: 1;
        content: "×";
      }

      .skill-description {
        border: 1px solid #d8e0e8;
        border-radius: 8px;
        background: #fbfcfe;
        color: #526170;
        font-size: 12px;
        line-height: 1.55;
        padding: 10px;
      }

      .skill-actions {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .skill-actions button {
        min-height: 34px;
        border-radius: 8px;
        font-size: 12px;
        padding: 7px;
      }

      .skill-meta {
        margin: -4px 0 0;
        color: #647587;
        font-size: 11px;
        line-height: 1.45;
      }

      .settings {
        display: none;
        gap: 10px;
        border: 1px solid #d8e0e8;
        border-radius: 8px;
        background: #fbfcfe;
        padding: 10px;
      }

      .settings.visible {
        display: grid;
      }

      .field-grid {
        display: grid;
        gap: 10px;
      }

      .main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-width: 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid #dce3eb;
        background: #ffffff;
        padding: 14px 18px;
      }

      .topbar strong {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .workspace {
        overflow: auto;
        padding: 22px;
      }

      .hero-result {
        display: grid;
        gap: 14px;
        max-width: 1120px;
        margin: 0 auto 22px;
      }

      .result-card {
        display: grid;
        gap: 12px;
        border: 1px solid #dce3eb;
        border-radius: 10px;
        background: #ffffff;
        padding: 14px;
      }

      .result-card img {
        width: 100%;
        max-height: 68vh;
        border-radius: 8px;
        background: #121720;
        object-fit: contain;
      }

      .result-meta {
        display: grid;
        gap: 6px;
        color: #526170;
        font-size: 13px;
        line-height: 1.55;
      }

      .result-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .danger {
        border-color: #fecaca;
        background: #fff7f7;
        color: #b42318;
      }

      .danger:hover {
        border-color: #f87171;
        background: #fee2e2;
        color: #991b1b;
      }

      .result-delete {
        opacity: 0;
        pointer-events: none;
        transform: translateY(-1px);
        transition:
          opacity 140ms ease,
          transform 140ms ease;
      }

      .result-card:hover .result-delete,
      .result-card:focus-within .result-delete {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }

      .history {
        display: grid;
        gap: 12px;
        max-width: 1120px;
        margin: 0 auto;
      }

      .history-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .history-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 12px;
      }

      .thumb {
        position: relative;
        display: grid;
        gap: 8px;
        border: 1px solid #d8e0e8;
        border-radius: 9px;
        background: #ffffff;
        color: #26313d;
        cursor: pointer;
        padding: 8px;
        text-align: left;
      }

      .thumb.selected {
        border-color: #1f6feb;
        box-shadow: 0 0 0 2px rgba(31, 111, 235, 0.14);
      }

      .thumb img {
        width: 100%;
        aspect-ratio: 4 / 3;
        border-radius: 6px;
        background: #121720;
        object-fit: cover;
      }

      .thumb span {
        overflow: hidden;
        font-size: 12px;
        font-weight: 720;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .thumb-delete {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 22px;
        min-width: 22px;
        height: 22px;
        min-height: 22px;
        border-color: rgba(248, 113, 113, 0.42);
        background: rgba(255, 255, 255, 0.78);
        color: #b42318;
        font-size: 14px;
        opacity: 0;
        padding: 0;
        pointer-events: none;
        transform: scale(0.92);
        transition:
          opacity 140ms ease,
          background 140ms ease,
          transform 140ms ease;
      }

      .thumb:hover .thumb-delete,
      .thumb:focus-within .thumb-delete {
        opacity: 1;
        pointer-events: auto;
        transform: scale(1);
      }

      .thumb-delete:hover {
        background: rgba(255, 255, 255, 0.96);
      }

      .message {
        white-space: pre-wrap;
        border: 1px solid #dce3eb;
        border-radius: 8px;
        background: #f8fafc;
        color: #314050;
        font-size: 12px;
        line-height: 1.55;
        min-height: 42px;
        padding: 10px;
      }

      .empty {
        display: grid;
        place-items: center;
        min-height: 360px;
        border: 1px dashed #b8c6d5;
        border-radius: 10px;
        background: #ffffff;
        color: #647587;
        text-align: center;
        padding: 28px;
      }

      @media (max-width: 900px) {
        .app {
          grid-template-columns: 1fr;
          height: auto;
        }

        .sidebar {
          border-right: 0;
        }

        .sidebar-resizer {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="sidebar">
        <section class="header">
          <div class="mode-nav">
            <button type="button" class="active" id="imageButton">图片</button>
            <button type="button" id="productDetailButton">设计</button>
            <button type="button" id="videoButton">视频</button>
            <button type="button" id="backButton">画布</button>
            <button type="button" id="notebookButton">文本</button>
          </div>
          <p>上传、粘贴或拖入一张底图，选择 API 后生成。结果会直接显示在右侧，也会保存到本机任务目录。</p>
        </section>

        <section class="section">
          <h2>选择平台</h2>
          <div class="provider-row">
            <label>
              生图模型 / 平台
              <select id="providerSelect"></select>
            </label>
            <button type="button" id="settingsButton">API 设置</button>
          </div>
          <div class="settings" id="settingsPanel">
            <div class="title-row">
              <h2 id="settingsTitle">API 设置</h2>
              <button type="button" id="refreshConfigButton">刷新</button>
            </div>
            <div class="field-grid" id="settingsFields"></div>
            <button type="button" class="primary" id="saveConfigButton">保存 API 设置</button>
          </div>
        </section>

        <section class="section">
          <label>
            Skill / 生成策略
            <select id="skillSelect"></select>
          </label>
          <p class="skill-description" id="skillDescription"></p>
          <div class="skill-actions">
            <button type="button" id="skillUploadButton">上传 Skill</button>
            <button type="button" id="skillInstallButton">安装当前</button>
            <button type="button" id="skillDownloadButton">下载当前</button>
          </div>
          <input id="skillInput" type="file" accept="application/json,.json" hidden />
          <p class="skill-meta" id="skillMeta">Skill 文件是 JSON，可上传后安装到本机列表。</p>
          <label>
            生成比例
            <select id="aspectRatioSelect">
              <option value="adaptive">自动 / 沿用底图</option>
              <option value="1:1">1:1</option>
              <option value="16:9">16:9</option>
              <option value="9:16">9:16</option>
              <option value="4:3">4:3</option>
              <option value="3:4">3:4</option>
              <option value="3:2">3:2</option>
              <option value="2:3">2:3</option>
            </select>
          </label>
          <label>
            生成/改图要求
            <textarea id="promptInput" placeholder="比如：只把蓝色圆形改成暖红色，保持背景和其它元素不变。"></textarea>
          </label>
          <label>
            反向提示词（可选）
            <textarea id="negativePromptInput" placeholder="比如：不要换脸、不要改变背景、不要多手指、不要模糊、不要文字乱码。"></textarea>
          </label>
          <button type="button" class="primary" id="generateButton">生成图片</button>
          <pre class="message" id="message">准备就绪。</pre>
        </section>

        <section class="section">
          <h2>底图</h2>
          <div class="button-row">
            <button type="button" id="uploadButton">上传图片</button>
            <button type="button" id="pasteButton">粘贴图片</button>
          </div>
          <input id="fileInput" type="file" accept="image/*" hidden />
          <div class="drop-zone" id="dropZone">
            <p>把图片拖到这里，或用上传/粘贴导入</p>
          </div>
          <div class="source-preview" id="sourcePreview">
            <img id="sourceImage" alt="source" />
            <p id="sourceName"></p>
          </div>
        </section>

        <section class="section">
          <h2>参考图</h2>
          <p>最多 5 张。可以作为产品、物件、局部元素、人物/风格参考一起传给图片 API。</p>
          <div class="button-row">
            <button type="button" id="referenceUploadButton">上传参考图</button>
            <button type="button" id="referencePasteButton">粘贴参考图</button>
          </div>
          <input id="referenceInput" type="file" accept="image/*" multiple hidden />
          <div class="reference-list" id="referenceDropZone"></div>
          <button type="button" id="clearReferencesButton">清空参考图</button>
        </section>
      </aside>

      <button type="button" class="sidebar-resizer" id="sidebarResizer" aria-label="调整左侧宽度"></button>

      <section class="main">
        <header class="topbar">
          <strong id="topStatus">生成结果会展示在这里</strong>
          <button type="button" id="refreshHistoryButton">刷新历史结果</button>
        </header>
        <div class="workspace">
          <section class="hero-result" id="heroResult">
            <div class="empty">还没有结果。生成成功后会直接显示在这里。</div>
          </section>
          <section class="history">
            <div class="history-header">
              <h2>历史生成</h2>
              <p id="historyCount">0 张</p>
            </div>
            <div class="history-grid" id="historyGrid"></div>
          </section>
        </div>
      </section>
    </main>

    <script>
      const apiBase = location.protocol === "file:" ? "http://127.0.0.1:43219" : "";
      const providers = [
        { id: "wanxiang", name: "阿里万象" },
        { id: "volcengine", name: "火山" },
        { id: "kling", name: "可灵" },
        { id: "fal", name: "fal.ai" },
        { id: "openai", name: "OpenAI" },
        { id: "my", name: "Midjourney" },
        { id: "flux", name: "Flux" },
        { id: "sd", name: "Stable Diffusion (SD)" },
      ];

      const defaultSkills = [
        {
          id: "strict-local-edit",
          name: "严格局部修补",
          description: "以底图为基础，只修改明确要求的位置，尽量保持未提到区域不变。",
          prompt:
            "严格局部修补模式。以底图作为基础图，只修改用户明确要求的位置；未提到的区域、构图、光线、材质、镜头距离和整体质感尽量保持不变。",
        },
        {
          id: "portrait-identity",
          name: "人物一致性",
          description: "适合真人/人物改图，优先保持同一人物身份、脸型和五官比例。",
          prompt:
            "人物一致性优先。必须保持同一人物身份、脸型轮廓、头型、下巴、颧骨、鼻型、嘴型、发际线、肤色、五官比例和表情；不要美化、不要换脸。若人物一致性和其它改动冲突，缩小改动范围。",
        },
        {
          id: "reference-fusion",
          name: "参考图自然融合",
          description: "适合把产品、物件、配饰、局部元素自然融合进底图。",
          prompt:
            "参考图只作为产品、物件、局部元素或风格参考。把参考图自然融合进底图场景，保持透视、光线、阴影、材质和景深一致；不要机械拼贴，不要替换主图主体。",
        },
        {
          id: "style-reference",
          name: "风格参考",
          description: "适合只借鉴参考图的色调、质感、摄影或设计风格。",
          prompt:
            "参考图主要用于风格参考，只借鉴色调、材质质感、构图语言、摄影光线或设计风格。主体内容仍以底图和用户要求为准。",
        },
        {
          id: "product-commercial",
          name: "商业产品图",
          description: "适合电商、广告、产品融合，强调真实、干净、可展示。",
          prompt:
            "商业产品图模式。结果应干净、真实、可展示，产品或参考元素要有合理比例、接触阴影、材质细节和统一光线，整体像高质量商业摄影或电商广告图。",
        },
      ];

      const customSkillStorageKey = "cowart-image-generator-skills";

      let currentProvider = "wanxiang";
      let currentSkill = "strict-local-edit";
      let currentAspectRatio = "adaptive";
      let customSkills = loadCustomSkills();
      let skills = mergeSkills();
      let configProviders = [];
      let configValues = {};
      let currentImage = null;
      let referenceImages = [];
      let selectedHistoryPath = "";

      const providerSelect = document.querySelector("#providerSelect");
      const settingsPanel = document.querySelector("#settingsPanel");
      const settingsTitle = document.querySelector("#settingsTitle");
      const settingsFields = document.querySelector("#settingsFields");
      const message = document.querySelector("#message");
      const topStatus = document.querySelector("#topStatus");
      const fileInput = document.querySelector("#fileInput");
      const referenceInput = document.querySelector("#referenceInput");
      const sourcePreview = document.querySelector("#sourcePreview");
      const sourceImage = document.querySelector("#sourceImage");
      const sourceName = document.querySelector("#sourceName");
      const dropZone = document.querySelector("#dropZone");
      const referenceDropZone = document.querySelector("#referenceDropZone");
      const referenceList = referenceDropZone;
      const skillSelect = document.querySelector("#skillSelect");
      const skillDescription = document.querySelector("#skillDescription");
      const skillInput = document.querySelector("#skillInput");
      const skillMeta = document.querySelector("#skillMeta");
      const aspectRatioSelect = document.querySelector("#aspectRatioSelect");
      const promptInput = document.querySelector("#promptInput");
      const negativePromptInput = document.querySelector("#negativePromptInput");
      const heroResult = document.querySelector("#heroResult");
      const historyGrid = document.querySelector("#historyGrid");
      const historyCount = document.querySelector("#historyCount");
      const sidebarResizer = document.querySelector("#sidebarResizer");

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function startSidebarResize(event) {
        event.preventDefault();
        const startX = event.clientX;
        const startWidth = document.querySelector(".sidebar").getBoundingClientRect().width;
        const onMove = (moveEvent) => {
          const nextWidth = clamp(startWidth + moveEvent.clientX - startX, 300, Math.min(620, window.innerWidth - 360));
          document.documentElement.style.setProperty("--sidebar-width", `${Math.round(nextWidth)}px`);
        };
        const onUp = () => {
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
        };
        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp, { once: true });
      }

      function setMessage(text) {
        message.textContent = text;
        topStatus.textContent = text.split("\n")[0] || "准备就绪";
      }

      function renderProviders() {
        providerSelect.innerHTML = "";
        for (const provider of providers) {
          const option = document.createElement("option");
          option.value = provider.id;
          option.textContent = provider.name;
          providerSelect.appendChild(option);
        }
        providerSelect.value = currentProvider;
      }

      function renderSkills() {
        if (!skills.some((skill) => skill.id === currentSkill)) {
          currentSkill = skills[0]?.id || "";
        }
        skillSelect.innerHTML = "";
        for (const skill of skills) {
          const option = document.createElement("option");
          option.value = skill.id;
          option.textContent = skill.installedAt ? `${skill.name} · 已安装` : skill.name;
          skillSelect.appendChild(option);
        }
        skillSelect.value = currentSkill;
        updateSkillDescription();
      }

      function updateSkillDescription() {
        const skill = skills.find((item) => item.id === currentSkill) || skills[0];
        skillDescription.textContent = skill ? skill.description : "";
        skillMeta.textContent = skill
          ? `当前 Skill：${skill.name}。内置 ${defaultSkills.length} 个，自定义 ${customSkills.length} 个。`
          : "Skill 文件是 JSON，可上传后安装到本机列表。";
      }

      function normalizeSkill(value, fallbackIndex = 0) {
        if (!value || typeof value !== "object") return null;
        const name = String(value.name || value.title || "").trim();
        const prompt = String(value.prompt || value.instructions || value.system || "").trim();
        if (!name || !prompt) return null;
        const rawId = String(value.id || value.slug || name).trim().toLowerCase();
        const slug = rawId.replace(/[^a-z0-9-]+/g, "-").replace(/^-+|-+$/g, "") || `skill-${Date.now()}`;
        const id = slug.startsWith("custom-") ? slug : `custom-${slug}-${fallbackIndex}`;
        return {
          id,
          name,
          description: String(value.description || value.summary || "用户安装的自定义 Skill。").trim(),
          prompt,
          installedAt: value.installedAt || new Date().toISOString(),
        };
      }

      function loadCustomSkills() {
        try {
          const parsed = JSON.parse(localStorage.getItem(customSkillStorageKey) || "[]");
          return Array.isArray(parsed) ? parsed.map((item, index) => normalizeSkill(item, index)).filter(Boolean) : [];
        } catch {
          return [];
        }
      }

      function saveCustomSkills() {
        localStorage.setItem(customSkillStorageKey, JSON.stringify(customSkills, null, 2));
      }

      function mergeSkills() {
        const byId = new Map();
        for (const skill of defaultSkills) byId.set(skill.id, skill);
        for (const skill of customSkills) byId.set(skill.id, skill);
        return Array.from(byId.values());
      }

      function installSkills(nextSkills) {
        const normalized = nextSkills.map((item, index) => normalizeSkill(item, index)).filter(Boolean);
        if (normalized.length === 0) {
          setMessage("没有识别到可安装的 Skill。JSON 里至少要有 name 和 prompt。");
          return;
        }
        const byId = new Map(customSkills.map((skill) => [skill.id, skill]));
        for (const skill of normalized) byId.set(skill.id, skill);
        customSkills = Array.from(byId.values());
        skills = mergeSkills();
        saveCustomSkills();
        currentSkill = normalized[0].id;
        renderSkills();
        setMessage(`已安装 ${normalized.length} 个 Skill。`);
      }

      async function uploadSkillFile(file) {
        if (!file) return;
        const parsed = JSON.parse(await file.text());
        const candidates = Array.isArray(parsed) ? parsed : Array.isArray(parsed.skills) ? parsed.skills : [parsed];
        installSkills(candidates);
      }

      function downloadCurrentSkill() {
        const skill = skills.find((item) => item.id === currentSkill) || skills[0];
        if (!skill) return;
        const safeName = (skill.name || "cowart-skill").replace(/[\\/:*?"<>|]+/g, "-");
        const blob = new Blob([JSON.stringify(skill, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `${safeName}.json`;
        link.click();
        URL.revokeObjectURL(url);
        setMessage("已下载当前 Skill。");
      }

      function installCurrentSkill() {
        const skill = skills.find((item) => item.id === currentSkill);
        if (!skill) return;
        installSkills([{ ...skill, id: `${skill.id}-copy-${Date.now()}`, name: `${skill.name} 副本`, installedAt: undefined }]);
      }

      async function loadConfig() {
        const response = await fetch(`${apiBase}/api/image-config`, { cache: "no-store" });
        const data = await response.json();
        if (!response.ok || data.error) throw new Error(data.error || "读取 API 设置失败");
        configProviders = data.providers || [];
        for (const provider of configProviders) {
          for (const field of provider.fields) {
            if (field.secret) {
              configValues[field.key] ||= "";
            } else {
              configValues[field.key] = field.value || "";
            }
          }
        }
        renderSettings();
      }

      function renderSettings() {
        const provider = configProviders.find((item) => item.id === currentProvider);
        settingsFields.innerHTML = "";
        settingsTitle.textContent = `${provider?.name || currentProvider} API 设置`;
        if (!provider) {
          settingsFields.innerHTML = "<p>还没有读到这个平台的设置项。</p>";
          return;
        }
        for (const field of provider.fields) {
          const label = document.createElement("label");
          const title = document.createElement("span");
          title.textContent = field.configured && field.secret ? `${field.label}（已保存）` : field.label;
          const input = document.createElement("input");
          input.type = field.secret ? "password" : "text";
          input.value = configValues[field.key] || "";
          input.placeholder = field.secret && field.configured ? "已保存，留空不修改" : field.placeholder || field.key;
          input.autocomplete = "off";
          input.addEventListener("input", () => {
            configValues[field.key] = input.value;
          });
          label.append(title, input);
          settingsFields.appendChild(label);
        }
      }

      async function saveConfig() {
        const provider = configProviders.find((item) => item.id === currentProvider);
        if (!provider) return;
        const values = Object.fromEntries(provider.fields.map((field) => [field.key, configValues[field.key] || ""]));
        setMessage("正在保存 API 设置...");
        const response = await fetch(`${apiBase}/api/image-config`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ provider: currentProvider, values }),
        });
        const data = await response.json();
        if (!response.ok || data.error) throw new Error(data.error || "保存 API 设置失败");
        configProviders = data.providers || [];
        renderSettings();
        setMessage("API 设置已保存。");
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result));
          reader.onerror = () => reject(reader.error || new Error("读图失败"));
          reader.readAsDataURL(file);
        });
      }

      async function setSourceFile(file) {
        if (!file || !file.type.startsWith("image/")) return;
        const dataUrl = await readFileAsDataUrl(file);
        currentImage = {
          title: file.name || "source.png",
          source: "uploaded",
          imageDataUrl: dataUrl,
        };
        sourceImage.src = dataUrl;
        sourceName.textContent = file.name || "source.png";
        sourcePreview.classList.add("visible");
        setMessage("底图已导入，可以生成。");
      }

      async function addReferenceFiles(files) {
        const imageFiles = Array.from(files || []).filter((file) => file.type.startsWith("image/"));
        if (imageFiles.length === 0) return;
        const next = [...referenceImages];
        for (const file of imageFiles) {
          if (next.length >= 5) break;
          next.push({
            id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            title: file.name || `reference-${next.length + 1}.png`,
            imageDataUrl: await readFileAsDataUrl(file),
          });
        }
        referenceImages = next;
        renderReferenceList();
        setMessage(`已加入 ${referenceImages.length}/5 张参考图。`);
      }

      function renderReferenceList() {
        referenceList.innerHTML = "";
        for (const reference of referenceImages) {
          const card = document.createElement("div");
          card.className = "reference-card";
          const img = document.createElement("img");
          img.src = reference.imageDataUrl;
          img.alt = reference.title;
          const title = document.createElement("span");
          title.textContent = reference.title;
          const remove = document.createElement("button");
          remove.type = "button";
          remove.textContent = "删除";
          remove.addEventListener("click", () => {
            referenceImages = referenceImages.filter((item) => item.id !== reference.id);
            renderReferenceList();
            setMessage(`已删除一张参考图。当前 ${referenceImages.length}/5 张。`);
          });
          card.append(img, title, remove);
          referenceList.appendChild(card);
        }
        for (let index = referenceImages.length; index < 5; index += 1) {
          const empty = document.createElement("button");
          empty.type = "button";
          empty.className = "reference-card empty";
          empty.textContent = index === referenceImages.length ? "添加参考图" : "空位";
          empty.addEventListener("click", () => referenceInput.click());
          referenceList.appendChild(empty);
        }
      }

      async function pasteImage() {
        const items = await navigator.clipboard.read();
        for (const item of items) {
          const type = item.types.find((itemType) => itemType.startsWith("image/"));
          if (!type) continue;
          const blob = await item.getType(type);
          await setSourceFile(new File([blob], `pasted-${Date.now()}.png`, { type }));
          return;
        }
        setMessage("剪贴板里没有图片。");
      }

      async function pasteReferenceImage() {
        const items = await navigator.clipboard.read();
        for (const item of items) {
          const type = item.types.find((itemType) => itemType.startsWith("image/"));
          if (!type) continue;
          const blob = await item.getType(type);
          await addReferenceFiles([new File([blob], `reference-${Date.now()}.png`, { type })]);
          return;
        }
        setMessage("剪贴板里没有参考图片。");
      }

      async function generateImage() {
        if (!currentImage) {
          setMessage("先上传、粘贴或拖入一张底图。");
          return;
        }
        const editPrompt = promptInput.value.trim();
        if (!editPrompt) {
          setMessage("先写生成/改图要求。");
          return;
        }
        const negativePrompt = negativePromptInput.value.trim();
        const skill = skills.find((item) => item.id === currentSkill) || skills[0];
        const aspectRatioText = currentAspectRatio === "adaptive" ? "自动 / 沿用底图" : currentAspectRatio;
        const finalPrompt = [
          `Skill：${skill.name}`,
          skill.prompt,
          `生成比例：${aspectRatioText}`,
          referenceImages.length > 0 ? `参考图数量：${referenceImages.length}。请根据所选 Skill 使用参考图。` : "",
          negativePrompt ? `反向提示词：${negativePrompt}` : "",
          "",
          `用户要求：${editPrompt}`,
        ]
          .filter(Boolean)
          .join("\n");
        const providerName = providers.find((item) => item.id === currentProvider)?.name || currentProvider;
        setMessage(`正在提交到 ${providerName}...`);
        const response = await fetch(`${apiBase}/api/image-generation`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            provider: currentProvider,
            image: { title: currentImage.title, source: currentImage.source },
            references: referenceImages.map((reference, index) => ({
              label: `参考图 ${index + 1}`,
              image: { title: reference.title, source: "uploaded" },
            })),
            annotations: [{ kind: "text", x: 50, y: 50, text: finalPrompt }],
            editPrompt: finalPrompt,
            negativePrompt,
            aspectRatio: currentAspectRatio,
            imageDataUrl: currentImage.imageDataUrl,
            referenceImageDataUrls: referenceImages.map((reference) => reference.imageDataUrl),
          }),
        });
        const data = await response.json();
        if (!response.ok || data.error) {
          throw new Error(data.error || "生成失败");
        }
        if (data.status === "needs_config") {
          setMessage(`还没提交到 ${providerName}：缺少 ${(data.missingEnv || []).join("、")}\n任务目录：${data.directory || ""}`);
          return;
        }
        if (data.resultImageUrl && data.resultImagePath) {
          showResult({
            name: data.resultImagePath.split("/").slice(-2).join("/"),
            path: data.resultImagePath,
            url: resolveUrl(data.resultImageUrl),
          });
          setMessage(`生成成功：${data.resultImagePath}`);
          await loadHistory();
          return;
        }
        setMessage(`已提交到 ${providerName}，但平台暂时没有直接返回图片。\n任务目录：${data.directory || ""}\n任务 ID：${data.providerTaskId || ""}`);
        await loadHistory();
      }

      function showResult(image) {
        selectedHistoryPath = image.path;
        heroResult.innerHTML = "";
        const card = document.createElement("article");
        card.className = "result-card";
        const img = document.createElement("img");
        img.src = image.url;
        img.alt = image.name;
        const meta = document.createElement("div");
        meta.className = "result-meta";
        meta.innerHTML = `<strong>${escapeHtml(image.name)}</strong><span>${escapeHtml(image.path)}</span>`;
        const actions = document.createElement("div");
        actions.className = "result-actions";
        const open = document.createElement("a");
        open.href = image.url;
        open.target = "_blank";
        open.rel = "noreferrer";
        open.textContent = "打开图片";
        const download = document.createElement("a");
        download.href = image.url;
        download.download = image.name || "cowart-image.png";
        download.textContent = "下载图片";
        const remove = document.createElement("button");
        remove.type = "button";
        remove.className = "danger result-delete";
        remove.textContent = "删除图片";
        remove.addEventListener("click", () => deleteGeneratedImage(image));
        actions.append(open, download, remove);
        card.append(img, meta, actions);
        heroResult.appendChild(card);
        renderHistorySelection();
      }

      async function deleteGeneratedImage(image) {
        const ok = window.confirm(`确定删除这张生成图片吗？\n\n${image.name}\n${image.path}`);
        if (!ok) return;
        const response = await fetch(`${apiBase}/api/generated-image-delete`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ path: image.path }),
        });
        const data = await response.json();
        if (!response.ok || data.error) throw new Error(data.error || "删除失败");
        if (selectedHistoryPath === image.path) {
          selectedHistoryPath = "";
          heroResult.innerHTML = `<div class="empty">已删除这张图片。可以从历史生成里选择其它图片。</div>`;
        }
        setMessage(`已删除：${image.name}`);
        await loadHistory();
      }

      async function loadHistory() {
        const response = await fetch(`${apiBase}/api/recent-images`, { cache: "no-store" });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "读取历史结果失败");
        const images = (data.images || []).filter((image) => /result|output|wanxiang|kling|volcengine|fal|openai|my|flux|sd/i.test(`${image.name} ${image.path}`));
        historyCount.textContent = `${images.length} 张`;
        historyGrid.innerHTML = "";
        for (const image of images.slice(0, 40)) {
          const button = document.createElement("article");
          button.tabIndex = 0;
          button.role = "button";
          button.className = `thumb ${selectedHistoryPath === image.path ? "selected" : ""}`;
          button.title = image.path;
          button.innerHTML = `<img src="${resolveUrl(image.url)}" alt=""><span>${escapeHtml(image.name)}</span>`;
          button.addEventListener("click", () => showResult(image));
          button.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              showResult(image);
            }
          });
          const remove = document.createElement("button");
          remove.type = "button";
          remove.className = "thumb-delete";
          remove.textContent = "×";
          remove.title = "删除图片";
          remove.addEventListener("click", (event) => {
            event.stopPropagation();
            deleteGeneratedImage(image).catch((error) => setMessage(error.message));
          });
          button.appendChild(remove);
          historyGrid.appendChild(button);
        }
        if (!selectedHistoryPath && images[0]) showResult(images[0]);
      }

      function renderHistorySelection() {
        for (const button of historyGrid.querySelectorAll(".thumb")) {
          button.classList.toggle("selected", button.title === selectedHistoryPath);
        }
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[char]);
      }

      function resolveUrl(url) {
        if (!url || /^https?:|^data:|^blob:/i.test(url)) return url;
        return `${apiBase}${url}`;
      }

      document.querySelector("#backButton").addEventListener("click", () => {
        window.location.href = location.protocol === "file:" ? `${apiBase}/?installed=1` : "/?installed=1";
      });
      document.querySelector("#productDetailButton").addEventListener("click", () => {
        window.location.href = location.protocol === "file:" ? "http://127.0.0.1:43219/product-detail-generator.html" : "/product-detail-generator.html";
      });
      document.querySelector("#videoButton").addEventListener("click", () => {
        window.location.href = location.protocol === "file:" ? `${apiBase}/?installed=1&video=1` : "/?installed=1&video=1";
      });
      document.querySelector("#notebookButton").addEventListener("click", () => {
        window.location.href = location.protocol === "file:" ? `${apiBase}/notebook.html` : "/notebook.html";
      });
      document.querySelector("#settingsButton").addEventListener("click", () => settingsPanel.classList.toggle("visible"));
      providerSelect.addEventListener("change", () => {
        currentProvider = providerSelect.value;
        renderSettings();
      });
      document.querySelector("#refreshConfigButton").addEventListener("click", () => loadConfig().catch((error) => setMessage(error.message)));
      document.querySelector("#saveConfigButton").addEventListener("click", () => saveConfig().catch((error) => setMessage(error.message)));
      document.querySelector("#skillUploadButton").addEventListener("click", () => skillInput.click());
      document.querySelector("#skillInstallButton").addEventListener("click", installCurrentSkill);
      document.querySelector("#skillDownloadButton").addEventListener("click", downloadCurrentSkill);
      document.querySelector("#uploadButton").addEventListener("click", () => fileInput.click());
      document.querySelector("#pasteButton").addEventListener("click", () => pasteImage().catch((error) => setMessage(error.message)));
      document.querySelector("#referenceUploadButton").addEventListener("click", () => referenceInput.click());
      document.querySelector("#referencePasteButton").addEventListener("click", () => pasteReferenceImage().catch((error) => setMessage(error.message)));
      document.querySelector("#clearReferencesButton").addEventListener("click", () => {
        referenceImages = [];
        renderReferenceList();
        setMessage("已清空参考图。");
      });
      document.querySelector("#generateButton").addEventListener("click", () => generateImage().catch((error) => setMessage(error.message)));
      document.querySelector("#refreshHistoryButton").addEventListener("click", () => loadHistory().catch((error) => setMessage(error.message)));
      sidebarResizer.addEventListener("pointerdown", startSidebarResize);
      skillInput.addEventListener("change", () => {
        uploadSkillFile(skillInput.files?.[0]).catch((error) => setMessage(error.message));
        skillInput.value = "";
      });
      fileInput.addEventListener("change", () => setSourceFile(fileInput.files?.[0]).catch((error) => setMessage(error.message)));
      referenceInput.addEventListener("change", () => addReferenceFiles(referenceInput.files).catch((error) => setMessage(error.message)));
      skillSelect.addEventListener("change", () => {
        currentSkill = skillSelect.value;
        updateSkillDescription();
      });
      aspectRatioSelect.addEventListener("change", () => {
        currentAspectRatio = aspectRatioSelect.value;
      });

      for (const eventName of ["dragenter", "dragover"]) {
        dropZone.addEventListener(eventName, (event) => {
          event.preventDefault();
          dropZone.classList.add("dragging");
        });
      }
      for (const eventName of ["dragleave", "drop"]) {
        dropZone.addEventListener(eventName, () => dropZone.classList.remove("dragging"));
      }
      dropZone.addEventListener("drop", (event) => {
        event.preventDefault();
        const file = Array.from(event.dataTransfer.files || []).find((item) => item.type.startsWith("image/"));
        if (file) setSourceFile(file).catch((error) => setMessage(error.message));
      });

      for (const eventName of ["dragenter", "dragover"]) {
        referenceDropZone.addEventListener(eventName, (event) => {
          event.preventDefault();
          referenceDropZone.classList.add("dragging");
        });
      }
      for (const eventName of ["dragleave", "drop"]) {
        referenceDropZone.addEventListener(eventName, () => referenceDropZone.classList.remove("dragging"));
      }
      referenceDropZone.addEventListener("drop", (event) => {
        event.preventDefault();
        addReferenceFiles(event.dataTransfer.files).catch((error) => setMessage(error.message));
      });

      renderProviders();
      renderSkills();
      renderReferenceList();
      loadConfig().catch((error) => setMessage(error.message));
      loadHistory().catch((error) => setMessage(error.message));
    </script>
  </body>
</html>
